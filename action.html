<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#24262b">
  <link rel="apple-touch-icon" href="content/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nashira">
  <meta name="mobile-web-app-capable" content="yes">
  <title>FORMA · Action</title>
  <meta name="description" content="FORMA. Un desarrollo residencial que se experimenta antes de habitarse.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f0ece3'/%3E%3Ccircle cx='32' cy='32' r='10' fill='%23ba4627'/%3E%3C/svg%3E">
  <script src="theme.js"></script>
  <!-- OG: reemplazar og:image con URL absoluta al definir el dominio de producción -->
  <meta property="og:title" content="FORMA · Action">
  <meta property="og:description" content="Un desarrollo residencial que se experimenta antes de habitarse.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="content/images/sequence/frame_000.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* papel (default) */
      --bg:           oklch(94% 0.010  85);
      --text:         oklch(24% 0.006  85);
      --muted:        oklch(52% 0.008  85);
      --accent:       oklch(54.8% 0.157 35.7);
      --border:       oklch(85% 0.008  85);
      --glass-bg:     oklch(97% 0.006  85 / 0.78);
      --glass-border: oklch(78% 0.010  85 / 0.55);
      --font-display: 'Big Shoulders Display', 'Arial Black', system-ui, sans-serif;
      --font-body:    'Barlow', system-ui, -apple-system, sans-serif;
    }
    html[data-theme='grafito'] {
      --bg:           oklch(18% 0.008 250);
      --text:         oklch(93% 0.005 250);
      --muted:        oklch(52% 0.01  250);
      --border:       oklch(26% 0.01  250);
      --glass-bg:     oklch(22% 0.01  250 / 0.80);
      --glass-border: oklch(34% 0.012 250 / 0.55);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── NAV ── */
    #nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 55;
      display: flex;
      align-items: center;
      gap: 36px;
      padding: 11px 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      white-space: nowrap;
      transition: background 0.4s;
    }

    .nav-brand {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: oklch(93% 0.005 250 / 0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-brand:hover { color: oklch(93% 0.005 250 / 0.9); }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.6875rem;
      font-weight: 600;
      color: oklch(93% 0.005 250);
      opacity: 0.40;
      text-decoration: none;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .nav-links a:hover  { opacity: 0.80; }
    .nav-links a.active { opacity: 1; }

    .nav-cta {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 7px 18px;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* Wrapper — transparente en desktop, contenedor fijo en móvil */
    #nav-wrapper { display: contents; }

    /* Dropdown — oculto en desktop, visible en móvil */
    #nav-mobile-dropdown { display: none; }

    /* ── PLACEHOLDER — mismo tratamiento de entrada que Ownership ── */
    .lo-content {
      position: fixed;
      left: 32px;
      bottom: 11vh;
      display: flex;
      flex-direction: column;
    }

    .lo-label {
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: oklch(44% 0.008 85);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    html[data-theme='grafito'] .lo-label { color: oklch(62% 0.01 250); }

    .lo-heading {
      font-family: var(--font-display);
      font-size: clamp(4rem, 8vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 0 3px 6px oklch(24% 0.006 85 / 0.18), 0 12px 32px oklch(24% 0.006 85 / 0.14);
    }
    html[data-theme='grafito'] .lo-heading {
      text-shadow: 0 3px 6px oklch(0% 0.008 250 / 0.5), 0 12px 32px oklch(0% 0.008 250 / 0.4);
    }

    .lo-quote {
      font-size: 0.875rem;
      font-weight: 400;
      line-height: 1.65;
      color: oklch(46% 0.008 85);
      letter-spacing: 0.01em;
      max-width: 440px;
    }
    html[data-theme='grafito'] .lo-quote { color: oklch(52% 0.008 250); }

    .lo-label, .lo-heading, .lo-quote { opacity: 1; }

    @media (prefers-reduced-motion: no-preference) {
      .lo-label {
        opacity: 0;
        transform: translateY(8px);
        animation: lo-rise   0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
      }
      .lo-heading {
        opacity: 0;
        filter: blur(20px);
        animation: lo-emerge 1.0s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards;
      }
      .lo-quote {
        opacity: 0;
        animation: lo-fade   0.8s ease-out 1.55s forwards;
      }
    }
    @keyframes lo-rise   { to { opacity: 1; transform: translateY(0); } }
    @keyframes lo-emerge { to { opacity: 1; filter: blur(0px); } }
    @keyframes lo-fade   { to { opacity: 1; } }

    @media (max-width: 767px) {
      .lo-content { left: 14px; bottom: calc(72px + env(safe-area-inset-bottom) + 4vh); }
    }

    /* ── MOBILE ≤ 767px ── */
    @media (max-width: 767px) {
      #nav-wrapper {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        min-width: 180px;
        z-index: 55;
      }

      .nav-links { display: none; }

      #nav {
        position: relative;
        top: auto; left: auto;
        transform: none;
        z-index: 2;
        width: 100%;
        justify-content: center;
        gap: 16px;
        padding: 9px 16px;
        min-height: 62px;
        border-radius: 100px;
        transition: background 0.4s;
      }

      .nav-cta { display: none; }

      .nav-brand::after {
        content: '▾';
        margin-left: 5px;
        font-size: 0.5rem;
        opacity: 0.40;
        display: inline-block;
        transition: transform 0.2s ease;
        vertical-align: middle;
      }
      .nav-brand[aria-expanded="true"]::after {
        transform: rotate(180deg);
        opacity: 0.70;
      }

      #nav-mobile-dropdown {
        display: block;
        position: relative;
        z-index: 1;
        width: 100%;
        margin-top: -31px;
        padding-top: 31px;
        background: oklch(17% 0.01 250 / 0.78);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid var(--glass-border);
        border-top: none;
        border-radius: 0 0 28px 28px;
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        pointer-events: none;
        transition: max-height 0.30s ease-out, opacity 0.22s ease;
      }

      #nav-mobile-dropdown.open {
        max-height: 280px;
        opacity: 1;
        pointer-events: auto;
      }

      .nav-mobile-links {
        display: flex;
        flex-direction: column;
        padding: 10px 0 6px;
      }

      .nav-mobile-links a {
        display: block;
        padding: 9px 0;
        font-size: 0.6875rem;
        font-weight: 500;
        color: oklch(93% 0.005 250);
        opacity: 0.45;
        text-decoration: none;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        text-align: center;
        transition: opacity 0.2s;
      }

      .nav-mobile-links a:hover  { opacity: 0.85; }
      .nav-mobile-links a.active { opacity: 1; }

      #nav-mobile-dropdown .nav-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 6px 16px 14px;
        padding: 10px 0;
        min-height: 44px;
        width: calc(100% - 32px);
        font-size: 0.6875rem;
      }
    }
  </style>
</head>
<body>

  <div id="nav-wrapper">
    <nav id="nav" aria-label="Navegación principal">
      <a href="#" class="nav-brand" aria-expanded="false" aria-controls="nav-mobile-dropdown">FORMA</a>
      <ul class="nav-links">
        <li><a href="emotion.html">Emotion</a></li>
        <li><a href="ownership.html">Ownership</a></li>
        <li><a href="action.html" class="active">Action</a></li>
        <li><a href="location.html">Location</a></li>
      </ul>
      <a href="#" class="nav-cta">Contacto</a>
    </nav>

    <div id="nav-mobile-dropdown" role="menu" aria-label="Menú de navegación">
      <nav class="nav-mobile-links" aria-label="Secciones del sitio">
        <a href="emotion.html" role="menuitem">Emotion</a>
        <a href="ownership.html" role="menuitem">Ownership</a>
        <a href="action.html" role="menuitem" class="active">Action</a>
        <a href="location.html" role="menuitem">Location</a>
      </nav>
      <a href="#" class="nav-cta" role="menuitem">Contacto</a>
    </div>
  </div>

  <div class="lo-content">
    <span class="lo-label">Próximamente</span>
    <h1 class="lo-heading">Action</h1>
    <p class="lo-quote" lang="en">Good design is honest.</p>
  </div>

  <script>
    (function () {
      const mq          = window.matchMedia('(max-width: 767px)');
      const navBrand    = document.querySelector('.nav-brand');
      const navDropdown = document.getElementById('nav-mobile-dropdown');
      const navWrapper  = document.getElementById('nav-wrapper');

      function closeDropdown() {
        navDropdown.classList.remove('open');
        navBrand.setAttribute('aria-expanded', 'false');
      }

      navBrand.addEventListener('click', (e) => {
        if (!mq.matches) return;
        e.preventDefault();
        if (navDropdown.classList.contains('open')) {
          closeDropdown();
        } else {
          navDropdown.classList.add('open');
          navBrand.setAttribute('aria-expanded', 'true');
        }
      });

      document.addEventListener('pointerdown', (e) => {
        if (!navDropdown.classList.contains('open')) return;
        if (!navWrapper.contains(e.target)) closeDropdown();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDropdown();
      });
    })();
  </script>
  <script src="transition.js"></script>
  <script src="rail.js"></script>
  <script src="fullscreen.js"></script>
  <script src="sparkles.js"></script>
  <script src="pwa.js"></script>

</body>
</html>
