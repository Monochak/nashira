<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORMA · Action</title>
  <meta name="description" content="FORMA. Un desarrollo residencial que se experimenta antes de habitarse.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2314141a'/%3E%3Ccircle cx='32' cy='32' r='10' fill='%23e09a4e'/%3E%3C/svg%3E">
  <!-- OG: reemplazar og:image con URL absoluta al definir el dominio de producción -->
  <meta property="og:title" content="FORMA · Action">
  <meta property="og:description" content="Un desarrollo residencial que se experimenta antes de habitarse.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="content/images/sequence/frame_000.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           oklch(9%  0.008 250);
      --text:         oklch(93% 0.005 250);
      --muted:        oklch(48% 0.01  250);
      --accent:       oklch(70% 0.175  52);
      --glass-bg:     oklch(13% 0.01  250 / 0.72);
      --glass-border: oklch(25% 0.012 250 / 0.55);
      --font-display: 'Big Shoulders Display', 'Arial Black', system-ui, sans-serif;
      --font-body:    'Barlow', system-ui, -apple-system, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── NAV ── */
    #nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 55;
      display: flex;
      align-items: center;
      gap: 36px;
      padding: 11px 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      white-space: nowrap;
      transition: background 0.4s;
    }

    .nav-brand {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: oklch(93% 0.005 250 / 0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-brand:hover { color: oklch(93% 0.005 250 / 0.9); }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.6875rem;
      font-weight: 600;
      color: oklch(93% 0.005 250);
      opacity: 0.40;
      text-decoration: none;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .nav-links a:hover  { opacity: 0.80; }
    .nav-links a.active { opacity: 1; }

    .nav-cta {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 7px 18px;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* Wrapper — transparente en desktop, contenedor fijo en móvil */
    #nav-wrapper { display: contents; }

    /* Dropdown — oculto en desktop, visible en móvil */
    #nav-mobile-dropdown { display: none; }

    /* ── PLACEHOLDER ── */
    .coming-soon {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .coming-soon-label {
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .coming-soon-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 6rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: oklch(93% 0.005 250 / 0.08);
      text-transform: uppercase;
    }

    /* ── MOBILE ≤ 767px ── */
    @media (max-width: 767px) {
      #nav-wrapper {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        min-width: 180px;
        z-index: 55;
      }

      .nav-links { display: none; }

      #nav {
        position: relative;
        top: auto; left: auto;
        transform: none;
        z-index: 2;
        width: 100%;
        justify-content: center;
        gap: 16px;
        padding: 9px 16px;
        min-height: 62px;
        border-radius: 100px;
        transition: background 0.4s;
      }

      .nav-cta { display: none; }

      .nav-brand::after {
        content: '▾';
        margin-left: 5px;
        font-size: 0.5rem;
        opacity: 0.40;
        display: inline-block;
        transition: transform 0.2s ease;
        vertical-align: middle;
      }
      .nav-brand[aria-expanded="true"]::after {
        transform: rotate(180deg);
        opacity: 0.70;
      }

      #nav-mobile-dropdown {
        display: block;
        position: relative;
        z-index: 1;
        width: 100%;
        margin-top: -31px;
        padding-top: 31px;
        background: oklch(17% 0.01 250 / 0.78);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid var(--glass-border);
        border-top: none;
        border-radius: 0 0 28px 28px;
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        pointer-events: none;
        transition: max-height 0.30s ease-out, opacity 0.22s ease;
      }

      #nav-mobile-dropdown.open {
        max-height: 280px;
        opacity: 1;
        pointer-events: auto;
      }

      .nav-mobile-links {
        display: flex;
        flex-direction: column;
        padding: 10px 0 6px;
      }

      .nav-mobile-links a {
        display: block;
        padding: 9px 0;
        font-size: 0.6875rem;
        font-weight: 500;
        color: oklch(93% 0.005 250);
        opacity: 0.45;
        text-decoration: none;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        text-align: center;
        transition: opacity 0.2s;
      }

      .nav-mobile-links a:hover  { opacity: 0.85; }
      .nav-mobile-links a.active { opacity: 1; }

      #nav-mobile-dropdown .nav-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 6px 16px 14px;
        padding: 10px 0;
        min-height: 44px;
        width: calc(100% - 32px);
        font-size: 0.6875rem;
      }
    }
  </style>
</head>
<body>

  <div id="nav-wrapper">
    <nav id="nav" aria-label="Navegación principal">
      <a href="#" class="nav-brand" aria-expanded="false" aria-controls="nav-mobile-dropdown">FORMA</a>
      <ul class="nav-links">
        <li><a href="emotion.html">Emotion</a></li>
        <li><a href="ownership.html">Ownership</a></li>
        <li><a href="action.html" class="active">Action</a></li>
        <li><a href="location.html">Location</a></li>
      </ul>
      <a href="#" class="nav-cta">Contacto</a>
    </nav>

    <div id="nav-mobile-dropdown" role="menu" aria-label="Menú de navegación">
      <nav class="nav-mobile-links" aria-label="Secciones del sitio">
        <a href="emotion.html" role="menuitem">Emotion</a>
        <a href="ownership.html" role="menuitem">Ownership</a>
        <a href="action.html" role="menuitem" class="active">Action</a>
        <a href="location.html" role="menuitem">Location</a>
      </nav>
      <a href="#" class="nav-cta" role="menuitem">Contacto</a>
    </div>
  </div>

  <div class="coming-soon">
    <span class="coming-soon-label">Próximamente</span>
    <h1 class="coming-soon-title">Action</h1>
  </div>

  <script>
    (function () {
      const mq          = window.matchMedia('(max-width: 767px)');
      const navBrand    = document.querySelector('.nav-brand');
      const navDropdown = document.getElementById('nav-mobile-dropdown');
      const navWrapper  = document.getElementById('nav-wrapper');

      function closeDropdown() {
        navDropdown.classList.remove('open');
        navBrand.setAttribute('aria-expanded', 'false');
      }

      navBrand.addEventListener('click', (e) => {
        if (!mq.matches) return;
        e.preventDefault();
        if (navDropdown.classList.contains('open')) {
          closeDropdown();
        } else {
          navDropdown.classList.add('open');
          navBrand.setAttribute('aria-expanded', 'true');
        }
      });

      document.addEventListener('pointerdown', (e) => {
        if (!navDropdown.classList.contains('open')) return;
        if (!navWrapper.contains(e.target)) closeDropdown();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDropdown();
      });
    })();
  </script>
  <script src="transition.js"></script>
  <script src="rail.js"></script>

</body>
</html>
