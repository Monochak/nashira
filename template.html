<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading…</title><!-- JS overwrites this from config.brand -->

  <!-- ┌──────────────────────────────────────────────────────────────────┐
       │  FONTS                                                           │
       │  Change this URL when switching typefaces.                       │
       │  Generator: https://fonts.google.com                            │
       │  Update --font-display and --font-body in the THEME block too.  │
       └──────────────────────────────────────────────────────────────────┘ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ┌──────────────────────────────────────────────────────────────────┐
       │  THEME — the only block you need to edit for a new visual brand │
       │                                                                  │
       │  Colors use OKLCH: oklch(lightness% chroma hue)                 │
       │  • Neutrals: keep chroma between 0.005 and 0.015.               │
       │  • Change the hue number on all neutrals together (e.g. 250 →   │
       │    180 to shift the tint from blue-cool to teal-cool).          │
       │  • --accent: pick any hue, raise chroma to 0.15–0.22.          │
       │                                                                  │
       │  The scrim, nav glass, and pill backdrop auto-inherit --bg       │
       │  via CSS relative colors — no manual updates needed.            │
       └──────────────────────────────────────────────────────────────────┘ -->
    :root {
      /* Neutrals — tinted toward the same hue */
      --bg:       oklch(9%  0.008 250);   /* near-black background          */
      --text:     oklch(93% 0.005 250);   /* primary text                   */
      --text-dim: oklch(88% 0.006 250);   /* body text, slightly dimmer     */
      --muted:    oklch(48% 0.01  250);   /* inactive UI elements           */
      --dim:      oklch(28% 0.009 250);   /* very dim text (loading label)  */
      --border:   oklch(17% 0.01  250);   /* borders, inactive dots         */

      /* Accent — the one color that pops (≈10% of the surface) */
      --accent:   oklch(70% 0.175  52);   /* warm amber — change freely     */

      /* Typography — pair with the Google Fonts URL above */
      --font-display: 'Big Shoulders Display', 'Arial Black', system-ui, sans-serif;
      --font-body:    'Barlow', system-ui, -apple-system, sans-serif;
    }
    /* END THEME — do not edit below this line for a simple rebrand */

    html { scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* navigation is gesture-driven; no page scroll */
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-optical-sizing: auto;
      font-kerning: normal;
      -webkit-font-smoothing: antialiased;
    }

    /* =====================================================
       UTILITIES
    ===================================================== */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 3px;
    }

    /* =====================================================
       LOADING SCREEN
    ===================================================== */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.8s ease;
    }

    #loading.out {
      opacity: 0;
      pointer-events: none;
    }

    #loading-brand {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--dim);
    }

    #loading-track {
      width: 180px;
      height: 1px;
      background: var(--border);
    }

    #loading-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    /* =====================================================
       INTRO VIDEO
    ===================================================== */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: var(--bg);
      transition: opacity 0.5s ease;
    }

    #intro-overlay.out {
      opacity: 0;
      pointer-events: none;
    }

    /* =====================================================
       STOP VIDEO
    ===================================================== */
    #stop-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      contain: paint; /* isolate repaint from canvas below */
    }

    #stop-overlay.in {
      opacity: 1;
      pointer-events: auto;
    }

    /* Shared video styles */
    #intro-video,
    .pool-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* =====================================================
       CANVAS
    ===================================================== */
    #scroll-wrapper { /* height set by JS */ }

    #stage {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh; /* mobile: excludes address bar */
      overflow: hidden;
      contain: paint;
      cursor: ew-resize;
      user-select: none;
    }

    /* While dragging: lock cursor across the whole page */
    body.is-dragging,
    body.is-dragging * { cursor: ew-resize !important; }

    #canvas {
      position: absolute;
      inset: 0;
      display: block;
      background: var(--bg);
    }

    /* Cinematic scrim — three gradient layers over the text zone.
       Colors automatically inherit from --bg via CSS relative colors,
       so changing --bg is the only update needed here. */
    #stage::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(to top,
          oklch(from var(--bg) l c h / 0.39) 0%,
          oklch(from var(--bg) l c h / 0.33) 28%,
          oklch(from var(--bg) l c h / 0.12) 55%,
          transparent 70%),
        linear-gradient(to right,
          oklch(from var(--bg) l c h / 0.72) 0%,
          oklch(from var(--bg) l c h / 0.20) 42%,
          transparent 60%),
        radial-gradient(ellipse 70% 55% at 10% 96%,
          oklch(from var(--bg) l c h / 0.75) 0%,
          transparent 100%);
    }

    /* =====================================================
       TEXT OVERLAY
       Fixed bottom-left. z-index 45 puts it above stop video.
    ===================================================== */
    #text-overlay {
      position: fixed;
      left: 64px;
      bottom: 100px;
      z-index: 45;
      pointer-events: none;
      width: 400px;
    }

    .stop-text {
      position: absolute;
      bottom: 0;
      left: 0;
      opacity: 0;
      isolation: isolate; /* keeps ::before z-index local */
    }

    /* Frosted pill behind the text — fades in slowly on show, snaps off on hide */
    .stop-text::before {
      content: '';
      position: absolute;
      inset: -18px -28px -22px -28px;
      z-index: -1;
      background: oklch(from var(--bg) l c h / 0.05);
      backdrop-filter: blur(4px) saturate(0.6);
      -webkit-backdrop-filter: blur(4px) saturate(0.6);
      border-radius: 20px;
      opacity: var(--bd-opacity, 0);
      transition: opacity var(--bd-dur, 0s) ease;
    }

    .stop-num {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stop-heading {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.6rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 16px;
      text-wrap: balance;
      text-shadow: 0 2px 24px oklch(0% 0 0 / 0.55);
    }

    .stop-body {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-dim);
      line-height: 1.75;
      max-width: 360px;
      letter-spacing: 0.01em;
      text-wrap: pretty;
      text-shadow: 0 1px 8px oklch(0% 0 0 / 0.60);
    }

    .word {
      display: inline;
      opacity: 0;
    }

    /* =====================================================
       CHAPTER INDICATORS (bottom-left, below text)
    ===================================================== */
    #chapters {
      position: fixed;
      bottom: 40px;
      left: 64px;
      z-index: 45;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .chap-dot {
      height: 2px;
      width: 20px;
      background: var(--border);
      border-radius: 2px;
      transition: width 0.4s ease, background 0.4s ease, opacity 0.4s ease;
      opacity: 0.5;
    }

    .chap-dot.is-active {
      width: 40px;
      background: var(--accent);
      opacity: 1;
    }

    .chap-dot.is-done {
      background: var(--muted);
      opacity: 0.6;
    }

    /* =====================================================
       NAV — floating glass pill, top-center
    ===================================================== */
    #nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 55;
      display: flex;
      align-items: center;
      gap: 36px;
      padding: 11px 24px;
      /* Glass panel — hue auto-inherited from --bg */
      background: oklch(from var(--bg) 13% 0.01 h / 0.72);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid oklch(from var(--bg) 25% 0.012 h / 0.55);
      border-radius: 100px;
      white-space: nowrap;
      transition: background 0.4s;
    }

    .nav-brand {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: oklch(from var(--text) l c h / 0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-brand:hover { color: oklch(from var(--text) l c h / 0.9); }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.75rem;
      font-weight: 500;
      color: oklch(from var(--text) l c h / 0.45);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: oklch(from var(--text) l c h / 0.9); }

    .nav-cta {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 7px 18px;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      text-decoration: none;
    }
    .nav-cta:hover { opacity: 0.85; transform: scale(1.03); }

    /* =====================================================
       SCROLL HINT (bottom-right, visible after boot)
    ===================================================== */
    #scroll-hint {
      position: fixed;
      bottom: 40px;
      right: 48px;
      z-index: 45;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #scroll-hint.visible { opacity: 0.4; }

    .hint-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, var(--muted), transparent);
      animation: hintPulse 2.2s ease-in-out infinite;
    }

    .hint-label {
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1;   }
    }

    /* =====================================================
       REDUCED MOTION — kills all transitions/animations
    ===================================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration:        0.01ms !important;
        animation-iteration-count: 1      !important;
        transition-duration:       0.01ms !important;
      }
    }

    /* =====================================================
       TABLET  768px – 1023px
    ===================================================== */
    @media (min-width: 768px) and (max-width: 1023px) {
      #text-overlay { left: 40px; }
      #chapters     { left: 40px; }
      #scroll-hint  { right: 32px; }
    }

    /* =====================================================
       MOBILE  <= 767px
    ===================================================== */
    @media (max-width: 767px) {
      .nav-links { display: none; }

      #nav {
        gap: 16px;
        padding: 9px 16px;
      }

      .nav-cta {
        padding: 9px 16px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }

      #text-overlay {
        left: 24px;
        right: 16px;
        bottom: 80px;
        width: auto; /* left + right define the width */
      }

      .stop-body { max-width: none; }

      #chapters {
        left: 24px;
        bottom: 24px;
      }

      #scroll-hint {
        right: 24px;
        bottom: 24px;
      }
    }

    /* =====================================================
       SHORT VIEWPORT  <= 500px tall (landscape mobile)
    ===================================================== */
    @media (max-height: 500px) {
      #text-overlay { bottom: 52px; }
      #chapters     { bottom: 12px; }
      #scroll-hint  { display: none; }
    }
  </style>
</head>
<body>

  <!-- ╔═══════════════════════════════════════════════════════════════════╗
       ║  SITE CONFIG — all project content lives here                   ║
       ║                                                                   ║
       ║  Rules:                                                           ║
       ║  • Do not rename JSON keys — the engine reads them by name.      ║
       ║  • Values (strings, numbers, paths) are yours to change freely.  ║
       ║  • Add or remove stops: any count works, not just 6.             ║
       ║  • Set "intro" to "" to skip the intro video entirely.           ║
       ║  • framePad controls zero-padding: 3 → "001", 4 → "0001".       ║
       ╚═══════════════════════════════════════════════════════════════════╝ -->
  <script type="application/json" id="site-config">
  {
    "brand": "PROJECT",

    "nav": {
      "links": [
        { "label": "Section one",   "href": "#" },
        { "label": "Section two",   "href": "#" },
        { "label": "Section three", "href": "#" }
      ],
      "cta": { "label": "Contact", "href": "#" }
    },

    "totalFrames": 360,
    "frameDir":    "content/images/sequence/",
    "framePrefix": "frame_",
    "framePad":    3,
    "frameExt":    ".jpg",

    "intro": "content/videos/intro.mp4",

    "stops": [
      { "frame": 0,   "video": "content/videos/video-01.mp4", "num": "01", "label": "Chapter one",   "body": "Description for chapter one. Replace with your copy." },
      { "frame": 60,  "video": "content/videos/video-02.mp4", "num": "02", "label": "Chapter two",   "body": "Description for chapter two. Replace with your copy." },
      { "frame": 120, "video": "content/videos/video-03.mp4", "num": "03", "label": "Chapter three", "body": "Description for chapter three. Replace with your copy." },
      { "frame": 180, "video": "content/videos/video-04.mp4", "num": "04", "label": "Chapter four",  "body": "Description for chapter four. Replace with your copy." },
      { "frame": 240, "video": "content/videos/video-05.mp4", "num": "05", "label": "Chapter five",  "body": "Description for chapter five. Replace with your copy." },
      { "frame": 300, "video": "content/videos/video-06.mp4", "num": "06", "label": "Chapter six",   "body": "Description for chapter six. Replace with your copy." }
    ]
  }
  </script>

  <!-- Screen-reader page heading (text set by JS from config.brand) -->
  <h1 class="sr-only" id="page-title"></h1>

  <!-- NAV — brand, links, and CTA all populated by JS from config -->
  <nav id="nav" aria-label="Main navigation">
    <a href="#" class="nav-brand" id="nav-brand"></a>
    <ul class="nav-links" id="nav-links-list"></ul>
    <a href="#" class="nav-cta"   id="nav-cta"></a>
  </nav>

  <!-- LOADING -->
  <div id="loading">
    <span id="loading-brand"></span>
    <div id="loading-track"><div id="loading-fill"></div></div>
  </div>

  <!-- INTRO VIDEO (auto-skipped if config.intro is empty) -->
  <div id="intro-overlay">
    <video id="intro-video" muted playsinline preload="auto"></video>
  </div>

  <!-- STOP VIDEO POOL — one <video> per stop, created by JS -->
  <div id="stop-overlay"></div>

  <!-- CANVAS -->
  <div id="scroll-wrapper">
    <div id="stage">
      <canvas id="canvas" role="img" aria-label="Scroll-driven motion sequence"></canvas>
    </div>
  </div>

  <!-- TEXT OVERLAY (above stop video, z-index 45) -->
  <div id="text-overlay"></div>

  <!-- CHAPTER INDICATORS -->
  <div id="chapters" aria-hidden="true"></div>

  <!-- SCROLL HINT -->
  <div id="scroll-hint" aria-hidden="true">
    <div class="hint-line"></div>
    <span class="hint-label">Scroll</span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════
       ENGINE — do not edit unless you know what you're changing
  ════════════════════════════════════════════════════════════════════ -->
  <script>
    /* =====================================================
       CONFIG
    ===================================================== */
    const C = JSON.parse(document.getElementById('site-config').textContent);

    /* =====================================================
       ELEMENTS
    ===================================================== */
    const loadingEl    = document.getElementById('loading');
    const loadingFill  = document.getElementById('loading-fill');
    const introOverlay = document.getElementById('intro-overlay');
    const introVideo   = document.getElementById('intro-video');
    const stopOverlay  = document.getElementById('stop-overlay');
    const canvas       = document.getElementById('canvas');
    const ctx          = canvas.getContext('2d');
    const textOverlay  = document.getElementById('text-overlay');
    const chaptersEl   = document.getElementById('chapters');
    const scrollHint   = document.getElementById('scroll-hint');

    /* =====================================================
       APPLY CONFIG TO DOM
       Brand text, nav links, and CTA are all data-driven.
    ===================================================== */
    document.title = C.brand;
    document.getElementById('page-title').textContent    = C.brand;
    document.getElementById('loading-brand').textContent = C.brand;

    const navBrand = document.getElementById('nav-brand');
    navBrand.textContent = C.brand;
    navBrand.setAttribute('aria-label', C.brand + ' — home');

    const navList = document.getElementById('nav-links-list');
    C.nav.links.forEach(link => {
      const li = document.createElement('li');
      const a  = document.createElement('a');
      a.href        = link.href;
      a.textContent = link.label;
      li.appendChild(a);
      navList.appendChild(li);
    });

    const navCta = document.getElementById('nav-cta');
    navCta.textContent = C.nav.cta.label;
    navCta.href        = C.nav.cta.href;

    /* =====================================================
       STOP VIDEO POOL
       One <video preload="auto"> per stop created at boot.
       All six buffer in the background so playback is
       instant when the user arrives at each stop.
    ===================================================== */
    const preloadedVideos = C.stops.map(stop => {
      const v = document.createElement('video');
      v.className = 'pool-video';
      v.muted     = true;
      v.setAttribute('playsinline', '');
      v.preload   = 'auto';
      v.src       = stop.video;
      v.style.display = 'none';
      stopOverlay.appendChild(v);
      return v;
    });

    /* =====================================================
       STATE
    ===================================================== */
    const frames         = new Array(C.totalFrames); // raw Image elements
    const bitmaps        = new Array(C.totalFrames); // decoded ImageBitmaps (off-thread)
    let currentFrame     = -1;
    let isLocked         = false;
    let currentStopIndex = 0;
    let isTransitioning  = false;  // true while frame tween runs
    let inputCooldown    = true;   // blocks nav until boot stop-0 finishes
    let isDragging       = false;
    let dragStartX       = 0;
    let touchStartY      = 0;
    let touchTriggered   = false;
    let prevChapterZone  = -1;     // short-circuits redundant dot updates
    let textVisible      = false;  // guard: skip hideText work when already hidden
    let cssWidth         = 0;
    let cssHeight        = 0;
    let resizeTimer      = null;
    let skipCurrentVideo = null;   // set during playStopVideo; call to interrupt

    /* =====================================================
       CANVAS RESIZE — HiDPI-aware, debounced 150ms
    ===================================================== */
    function resizeCanvas() {
      const dpr  = window.devicePixelRatio || 1;
      cssWidth   = window.innerWidth;
      cssHeight  = window.innerHeight;
      canvas.width          = Math.round(cssWidth  * dpr);
      canvas.height         = Math.round(cssHeight * dpr);
      canvas.style.width    = cssWidth  + 'px';
      canvas.style.height   = cssHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in logical pixels
      if (currentFrame >= 0) renderFrame(currentFrame);
    }
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resizeCanvas, 150);
    });
    resizeCanvas();

    /* =====================================================
       FRAME PATH
    ===================================================== */
    function framePath(i) {
      return C.frameDir
           + C.framePrefix
           + String(i).padStart(C.framePad, '0')
           + C.frameExt;
    }

    /* =====================================================
       RENDER FRAME
       Priority: decoded bitmap → raw img → gradient placeholder.
       drawCover replicates object-fit: cover — scales to fill,
       crops center, preserves aspect ratio.
    ===================================================== */
    function drawCover(source, srcW, srcH) {
      const scale   = Math.max(cssWidth / srcW, cssHeight / srcH);
      const drawW   = srcW * scale;
      const drawH   = srcH * scale;
      const offsetX = (cssWidth  - drawW) / 2;
      const offsetY = (cssHeight - drawH) / 2;
      ctx.drawImage(source, 0, 0, srcW, srcH, offsetX, offsetY, drawW, drawH);
    }

    function renderFrame(index) {
      currentFrame = index;
      const bmp = bitmaps[index];
      if (bmp) { drawCover(bmp, bmp.width, bmp.height); return; }
      const img = frames[index];
      if (img && img.complete && img.naturalWidth > 0) {
        drawCover(img, img.naturalWidth, img.naturalHeight);
      } else {
        // Gradient placeholder while assets are still loading
        const hue = 230 + (index / C.totalFrames) * 25;
        const l   = 10  + (index / C.totalFrames) * 6;
        ctx.fillStyle = `oklch(${l.toFixed(1)}% 0.015 ${hue.toFixed(0)})`;
        ctx.fillRect(0, 0, cssWidth, cssHeight);
      }
    }

    /* =====================================================
       LOAD FRAMES — two-phase strategy

       Phase 1 — Critical (stop frames only):
         Decoded as ImageBitmaps (off-thread). Loading bar
         reflects progress. Experience starts after all settle.

       Phase 2 — Background (all remaining frames):
         Loaded in batches of 12. Raw Image fallback is fast
         enough for inter-stop tweens.
    ===================================================== */
    function loadFrame(i, useBitmap) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          frames[i] = img;
          if (useBitmap && typeof createImageBitmap === 'function') {
            createImageBitmap(img)
              .then(bmp  => { bitmaps[i] = bmp; })
              .catch(()  => {})
              .finally(resolve);
          } else {
            resolve();
          }
        };
        img.onerror = resolve; // 404s do not block the experience
        img.src = framePath(i);
        frames[i] = img;
      });
    }

    function loadCriticalFrames() {
      const indices = C.stops.map(s => s.frame);
      let settled = 0;
      return Promise.all(
        indices.map(idx =>
          loadFrame(idx, true).then(() => {
            settled++;
            loadingFill.style.width =
              Math.round((settled / indices.length) * 100) + '%';
          })
        )
      );
    }

    function loadRemainingFrames() {
      const criticalSet = new Set(C.stops.map(s => s.frame));
      const queue = [];
      for (let i = 0; i < C.totalFrames; i++) {
        if (!criticalSet.has(i)) queue.push(i);
      }
      const BATCH = 12;
      let pos = 0;
      function nextBatch() {
        if (pos >= queue.length) return;
        const batch = queue.slice(pos, pos + BATCH);
        pos += BATCH;
        let done = 0;
        batch.forEach(i => {
          loadFrame(i, false).then(() => {
            if (i === currentFrame) renderFrame(i); // refresh if currently visible
            if (++done === batch.length) nextBatch();
          });
        });
      }
      nextBatch();
    }

    /* =====================================================
       BUILD TEXT OVERLAY — one .stop-text per stop
    ===================================================== */
    const textEls = [];

    C.stops.forEach((stop) => {
      const div = document.createElement('div');
      div.className = 'stop-text';
      const wordSpans = stop.body
        ? stop.body.split(' ').map(w => `<span class="word">${w}</span>`).join(' ')
        : '';
      div.innerHTML = stop.label
        ? `<p class="stop-num">${stop.num}</p>
           <h2 class="stop-heading">${stop.label}</h2>
           ${wordSpans ? `<p class="stop-body">${wordSpans}</p>` : ''}`
        : `<p class="stop-num">${stop.num}</p>`;
      textOverlay.appendChild(div);
      textEls.push(div);
    });

    /* =====================================================
       BUILD CHAPTER INDICATORS
    ===================================================== */
    const chapDots = [];

    C.stops.forEach(() => {
      const dot = document.createElement('div');
      dot.className = 'chap-dot';
      chaptersEl.appendChild(dot);
      chapDots.push(dot);
    });

    /* =====================================================
       SHOW STOP TEXT

       Stagger schedule:
         0 ms               — stop number fades + rises
         120 ms             — heading fades + rises
         320 + (wi × 45 ms) — body words, one by one

       hideText() kills everything instantly when scroll resumes.
    ===================================================== */
    function showStopText(stopIndex) {
      textVisible = true;

      // Reset all elements — no transitions, instant
      textEls.forEach(el => {
        el.style.opacity = '0';
        el.style.setProperty('--bd-dur',     '0s');
        el.style.setProperty('--bd-opacity', '0');
        el.querySelectorAll('.stop-num, .stop-heading, .word').forEach(c => {
          c.style.transition = 'none';
          c.style.opacity    = '0';
          c.style.transform  = 'translateY(10px)';
        });
      });

      const el = textEls[stopIndex];
      el.style.opacity = '1';

      // Enable slow fade-in for the pill backdrop on next frame
      requestAnimationFrame(() => {
        el.style.setProperty('--bd-dur',     '0.55s');
        el.style.setProperty('--bd-opacity', '1');
      });

      const queue  = [];
      const numEl  = el.querySelector('.stop-num');
      const headEl = el.querySelector('.stop-heading');
      if (numEl)  queue.push({ node: numEl,  delay: 0   });
      if (headEl) queue.push({ node: headEl, delay: 120 });
      el.querySelectorAll('.word').forEach((w, wi) => {
        queue.push({ node: w, delay: 320 + wi * 45 });
      });

      queue.forEach(({ node, delay }) => {
        setTimeout(() => {
          node.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          node.style.opacity    = '1';
          node.style.transform  = 'translateY(0)';
        }, delay);
      });
    }

    function hideText() {
      if (!textVisible) return;
      textVisible = false;
      textEls.forEach(el => {
        el.style.opacity = '0';
        el.style.setProperty('--bd-dur',     '0s');
        el.style.setProperty('--bd-opacity', '0');
        el.querySelectorAll('.stop-num, .stop-heading, .word').forEach(c => {
          c.style.transition = 'none';
          c.style.opacity    = '0';
          c.style.transform  = 'translateY(10px)';
        });
      });
    }

    /* =====================================================
       UPDATE CHAPTER DOTS
       Short-circuits when the zone hasn't changed to avoid
       6 classList mutations every animation frame.
    ===================================================== */
    function updateChapters(zone) {
      if (zone === prevChapterZone) return;
      prevChapterZone = zone;
      chapDots.forEach((dot, i) => {
        dot.classList.toggle('is-active', i === zone);
        dot.classList.toggle('is-done',   i < zone);
      });
    }

    /* =====================================================
       SCROLL LOCK / UNLOCK
    ===================================================== */
    function lockScroll()   { isLocked = true;  document.documentElement.style.overflow = 'hidden'; }
    function unlockScroll() { isLocked = false; document.documentElement.style.overflow = ''; }

    /* =====================================================
       PLAY STOP VIDEO

       finish(immediate):
         false — natural end: wait 400ms for overlay fade, then onDone()
         true  — user interrupted: unlock immediately, fade runs in bg

       startTimer and showTimer stored so both can be cancelled
       if the user interrupts before playback or text begin.
    ===================================================== */
    function playStopVideo(stopIndex, onDone) {
      const v = preloadedVideos[stopIndex];
      v.currentTime   = 0; // rewind in case this stop was visited before
      v.style.display = 'block';

      let done = false, startTimer = null, showTimer = null;

      function finish(immediate) {
        if (done) return;
        done = true;
        clearTimeout(startTimer);
        clearTimeout(showTimer);
        skipCurrentVideo = null;
        v.removeEventListener('ended', onEnded);
        v.removeEventListener('error', onError);
        stopOverlay.classList.remove('in');
        v.pause();
        if (immediate) {
          v.style.display = 'none';
          stopOverlay.style.willChange = '';
          onDone();
        } else {
          setTimeout(() => {
            v.style.display = 'none';
            stopOverlay.style.willChange = '';
            onDone();
          }, 400);
        }
      }

      function onEnded() { finish(false); }
      function onError() { finish(false); }

      skipCurrentVideo = () => finish(true);
      v.addEventListener('ended', onEnded);
      v.addEventListener('error', onError);

      stopOverlay.style.willChange = 'opacity';
      stopOverlay.classList.add('in');
      startTimer = setTimeout(() => {
        v.play().catch(() => finish(false));
        showTimer = setTimeout(() => showStopText(stopIndex), 500);
      }, 400);
    }

    /* =====================================================
       FRAME ANIMATION — ease-out-quart tween
       Duration: clamp(distance × 16ms, 1200ms, 2400ms)
       Loop-aware: adjusts effectiveTo by ±totalFrames when
       crossing the frame-sequence boundary.
    ===================================================== */
    function wrapFrame(f) {
      return ((f % C.totalFrames) + C.totalFrames) % C.totalFrames;
    }

    function animateToFrame(fromFrame, toFrame, onDone, forward) {
      if (fromFrame === toFrame) { onDone(); return; }

      let effectiveTo = toFrame;
      if (forward === true  && toFrame < fromFrame) effectiveTo = toFrame + C.totalFrames;
      if (forward === false && toFrame > fromFrame) effectiveTo = toFrame - C.totalFrames;

      const distance  = Math.abs(effectiveTo - fromFrame);
      const duration  = Math.min(Math.max(distance * 16, 1200), 2400);
      const startTime = performance.now();

      (function tick(now) {
        const t     = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 4); // ease-out-quart
        renderFrame(wrapFrame(Math.round(fromFrame + (effectiveTo - fromFrame) * eased)));
        if (t < 1) requestAnimationFrame(tick);
        else { renderFrame(wrapFrame(effectiveTo)); onDone(); }
      })(performance.now());
    }

    /* =====================================================
       NAVIGATION — one gesture = one stop
       Both directions: tween + play stop video.
    ===================================================== */
    function goToStop(targetIndex, forward) {
      if (isTransitioning || isLocked || inputCooldown) return;
      if (targetIndex === currentStopIndex) return;

      isTransitioning = true;
      inputCooldown   = true;

      const fromFrame = currentFrame >= 0 ? currentFrame : C.stops[currentStopIndex].frame;
      const toFrame   = C.stops[targetIndex].frame;

      animateToFrame(fromFrame, toFrame, () => {
        currentStopIndex = targetIndex;
        isTransitioning  = false;
        updateChapters(currentStopIndex);
        hideText();

        lockScroll();
        playStopVideo(currentStopIndex, () => {
          unlockScroll();
          setTimeout(() => { inputCooldown = false; }, 200);
        });
      }, forward);
    }

    function goNext() { goToStop((currentStopIndex + 1) % C.stops.length, true);  }
    function goPrev() { goToStop((currentStopIndex - 1 + C.stops.length) % C.stops.length, false); }

    /* =====================================================
       VIDEO INTERRUPT — any gesture while locked skips the video
    ===================================================== */
    function tryInterrupt() {
      if (!isLocked || !skipCurrentVideo) return;
      hideText();
      skipCurrentVideo();
    }

    /* =====================================================
       INPUT HANDLERS — wheel · touch · keyboard · drag
    ===================================================== */
    window.addEventListener('wheel', e => {
      if (isLocked) { tryInterrupt(); return; }
      if (e.deltaY > 0) goNext();
      else if (e.deltaY < 0) goPrev();
    }, { passive: true });

    window.addEventListener('touchstart', e => {
      touchStartY    = e.touches[0].clientY;
      touchTriggered = false;
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      if (touchTriggered) return;
      const dy = touchStartY - e.touches[0].clientY;
      if (Math.abs(dy) < 24) return; // minimum swipe threshold
      touchTriggered = true;
      if (isLocked) { tryInterrupt(); return; }
      if (dy > 0) goNext();
      else        goPrev();
    }, { passive: true });

    window.addEventListener('keydown', e => {
      const down = ['ArrowDown', 'PageDown', ' '].includes(e.key);
      const up   = ['ArrowUp',   'PageUp'       ].includes(e.key);
      if (!down && !up) return;
      e.preventDefault();
      if (isLocked) { tryInterrupt(); return; }
      if (down) goNext();
      else      goPrev();
    });

    // Horizontal drag — left = forward, right = backward, threshold 24px
    const stage = document.getElementById('stage');

    stage.addEventListener('mousedown', e => {
      if (isLocked || isTransitioning || inputCooldown) return;
      e.preventDefault();
      isDragging = true;
      dragStartX = e.clientX;
      document.body.classList.add('is-dragging');
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      if (e.buttons === 0) {
        isDragging = false;
        document.body.classList.remove('is-dragging');
        return;
      }
      const dx = e.clientX - dragStartX;
      if (Math.abs(dx) < 24) return;
      isDragging = false;
      document.body.classList.remove('is-dragging');
      if (isLocked) { tryInterrupt(); return; }
      if (dx < 0) goNext(); // drag left  = forward
      else        goPrev(); // drag right = backward
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      document.body.classList.remove('is-dragging');
    });

    /* =====================================================
       PLAY INTRO — skipped automatically if config.intro is empty
    ===================================================== */
    function playIntro(onDone) {
      if (!C.intro) {
        introOverlay.style.display = 'none';
        onDone();
        return;
      }

      introVideo.src = C.intro;

      function finish() {
        introVideo.removeEventListener('ended', finish);
        introVideo.removeEventListener('error', finish);
        introOverlay.classList.add('out');
        setTimeout(() => { introOverlay.style.display = 'none'; onDone(); }, 500);
      }

      introVideo.addEventListener('ended', finish, { once: true });
      introVideo.addEventListener('error', finish, { once: true });
      introVideo.load();
      introVideo.play().catch(finish);
    }

    /* =====================================================
       ENABLE NAV — called once after boot stop-0 video ends
    ===================================================== */
    function enableNav() {
      inputCooldown = false;
      scrollHint.classList.add('visible');
      const hideHint = () => scrollHint.classList.remove('visible');
      window.addEventListener('wheel',      hideHint, { once: true, passive: true });
      window.addEventListener('touchstart', hideHint, { once: true, passive: true });
      window.addEventListener('keydown',    hideHint, { once: true });
    }

    /* =====================================================
       BOOT
    ===================================================== */
    function boot() {
      document.getElementById('scroll-wrapper').style.height = window.innerHeight + 'px';
      renderFrame(0);
      updateChapters(0);

      // Phase 1: load only stop frames, start the experience immediately after.
      loadCriticalFrames().then(() => {
        renderFrame(0); // re-render with the real bitmap now decoded
        loadingEl.classList.add('out');

        setTimeout(() => {
          loadingEl.style.display = 'none';
          playIntro(() => {
            hideText();
            lockScroll();
            playStopVideo(0, () => {
              currentStopIndex = 0;
              unlockScroll();
              enableNav();
            });
          });
        }, 400);

        // Phase 2: load all remaining frames quietly in the background.
        setTimeout(loadRemainingFrames, 200);
      });
    }

    boot();
  </script>
</body>
</html>
