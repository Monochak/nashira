<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORMA</title>
  <!-- Fonts: Big Shoulders Display (display headings) + Barlow (body + UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     oklch(9% 0.008 250);
      --text:   oklch(93% 0.005 250);
      --muted:  oklch(48% 0.01 250);
      --dim:    oklch(28% 0.009 250);
      --accent: oklch(70% 0.175 52);
      --border: oklch(17% 0.01 250);

      /* display headings / body + UI */
      --font-display: 'Big Shoulders Display', 'Arial Black', system-ui, sans-serif;
      --font-body:    'Barlow', system-ui, -apple-system, sans-serif;
    }

    html {
      scrollbar-width: none; /* Firefox */
    }
    html::-webkit-scrollbar {
      display: none; /* Chrome / Safari / Edge */
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* navigation is gesture-driven; no page scroll */
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-optical-sizing: auto;
      font-kerning: normal;
      -webkit-font-smoothing: antialiased;
    }

    /* =====================================================
       UTILITIES
    ===================================================== */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 3px;
    }

    /* =====================================================
       LOADING SCREEN
    ===================================================== */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.8s ease;
    }

    #loading.out {
      opacity: 0;
      pointer-events: none;
    }

    #loading-brand {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--dim);
    }

    #loading-track {
      width: 180px;
      height: 1px;
      background: var(--border);
    }

    #loading-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    /* =====================================================
       INTRO VIDEO
    ===================================================== */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: var(--bg);
      transition: opacity 0.5s ease;
    }

    #intro-overlay.out {
      opacity: 0;
      pointer-events: none;
    }

    /* =====================================================
       STOP VIDEO
    ===================================================== */
    #stop-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      contain: paint; /* isolate repaint from canvas below */
    }

    #stop-overlay.in {
      opacity: 1;
      pointer-events: auto;
    }

    /* Shared video styles */
    #intro-video,
    #stop-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* =====================================================
       CANVAS
    ===================================================== */
    #scroll-wrapper { /* height set by JS */ }

    #stage {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh; /* mobile browsers: excludes address bar */
      overflow: hidden;
      contain: paint; /* limit repaint to this element's bounds */
      cursor: grab;
      user-select: none;
    }

    /* While dragging: override cursor for the whole page */
    body.is-dragging,
    body.is-dragging * { cursor: grabbing !important; }

    #canvas {
      position: absolute;
      inset: 0;
      display: block;
      background: var(--bg);
    }

    /* Cinematic scrim — three layers anchored to the text zone:
       1. Vertical  (bottom → up)  : covers the text area solidly.
       2. Horizontal (left → right): adds left-side depth.
       3. Radial    (bottom-left)  : concentrated dark well exactly
          where heading + body live, survives any background tone. */
    #stage::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(to top,
          oklch(9% 0.008 250 / 0.98) 0%,
          oklch(9% 0.008 250 / 0.82) 28%,
          oklch(9% 0.008 250 / 0.30) 55%,
          transparent 70%),
        linear-gradient(to right,
          oklch(9% 0.008 250 / 0.72) 0%,
          oklch(9% 0.008 250 / 0.20) 42%,
          transparent 60%),
        radial-gradient(ellipse 70% 55% at 10% 96%,
          oklch(9% 0.008 250 / 0.75) 0%,
          transparent 100%);
    }

    /* =====================================================
       TEXT OVERLAY
       Sits above the stop video (z-index 45 > 40).
       Visible during stop videos and scroll scrubbing.
    ===================================================== */
    #text-overlay {
      position: fixed;
      left: 64px;
      bottom: 100px;
      z-index: 45;
      pointer-events: none;
      width: 400px;
    }


    .stop-text {
      position: absolute;
      bottom: 0;
      left: 0;
      opacity: 0;
      isolation: isolate; /* stacking context so ::before z-index: -1 stays local */
    }

    /* Pill backdrop — dark frosted panel behind the text.
       opacity and transition-duration are driven by JS custom
       properties so show = slow fade-in, hide = instant. */
    .stop-text::before {
      content: '';
      position: absolute;
      inset: -18px -28px -22px -28px;
      z-index: -1;
      background: oklch(9% 0.008 250 / 0.64);
      backdrop-filter: blur(16px) saturate(0.6);
      -webkit-backdrop-filter: blur(16px) saturate(0.6);
      border-radius: 20px;
      opacity: var(--bd-opacity, 0);
      transition: opacity var(--bd-dur, 0s) ease;
    }

    .stop-num {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stop-heading {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.6rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 16px;
      text-wrap: balance;
      text-shadow: 0 2px 24px oklch(0% 0 0 / 0.55);
    }

    .stop-body {
      font-size: 1rem;
      font-weight: 400;
      color: oklch(88% 0.006 250);
      line-height: 1.75;
      max-width: 360px;
      letter-spacing: 0.01em;
      text-wrap: pretty;
      text-shadow: 0 1px 8px oklch(0% 0 0 / 0.60);
    }

    .word {
      display: inline;
      opacity: 0;
    }

    /* =====================================================
       CHAPTER INDICATORS (bottom center)
    ===================================================== */
    #chapters {
      position: fixed;
      bottom: 40px;
      left: 64px;
      z-index: 45;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .chap-dot {
      height: 2px;
      width: 20px;
      background: var(--border);
      border-radius: 2px;
      transition: width 0.4s ease, background 0.4s ease, opacity 0.4s ease;
      opacity: 0.5;
    }

    .chap-dot.is-active {
      width: 40px;
      background: var(--accent);
      opacity: 1;
    }

    .chap-dot.is-done {
      background: var(--muted);
      opacity: 0.6;
    }

    /* =====================================================
       NAV — floating glass pill
    ===================================================== */
    #nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 55;
      display: flex;
      align-items: center;
      gap: 36px;
      padding: 11px 24px;
      background: oklch(13% 0.01 250 / 0.72);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid oklch(25% 0.012 250 / 0.55);
      border-radius: 100px;
      white-space: nowrap;
      transition: background 0.4s;
    }

    .nav-brand {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: oklch(93% 0.005 250 / 0.6);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-brand:hover { color: oklch(93% 0.005 250 / 0.9); }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.75rem;
      font-weight: 500;
      color: oklch(93% 0.005 250 / 0.45);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: oklch(93% 0.005 250 / 0.9); }

    .nav-cta {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 7px 18px;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      text-decoration: none;
    }

    .nav-cta:hover { opacity: 0.85; transform: scale(1.03); }

    /* =====================================================
       SCROLL HINT
    ===================================================== */
    #scroll-hint {
      position: fixed;
      bottom: 40px;
      right: 48px;
      z-index: 45;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #scroll-hint.visible { opacity: 0.4; }

    .hint-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, var(--muted), transparent);
      animation: hintPulse 2.2s ease-in-out infinite;
    }

    .hint-label {
      font-size: 0.5625rem; /* 9px in rem */
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1;   }
    }

    /* =====================================================
       REDUCED MOTION
       Kills all animations for users who prefer it.
       Stops still play (content), transitions go instant.
    ===================================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration:       0.01ms !important;
        animation-iteration-count: 1     !important;
        transition-duration:      0.01ms !important;
      }
    }

    /* =====================================================
       TABLET  768px – 1023px
       Tighten left gutter slightly; everything else holds.
    ===================================================== */
    @media (min-width: 768px) and (max-width: 1023px) {
      #text-overlay { left: 40px; }
      #chapters     { left: 40px; }
      #scroll-hint  { right: 32px; }
    }

    /* =====================================================
       MOBILE  ≤ 767px
    ===================================================== */
    @media (max-width: 767px) {
      /* Nav collapse */
      .nav-links {
        display: none;
      }

      #nav {
        gap: 16px;
        padding: 9px 16px;
      }

      .nav-cta {
        padding: 9px 16px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }

      /* Text overlay */
      #text-overlay {
        left: 24px;
        right: 16px;   /* prevents body text from clipping right edge */
        bottom: 80px;
        width: auto;   /* left + right define the width on mobile */
      }

      .stop-body {
        max-width: none; /* right constraint on #text-overlay handles it */
      }

      /* Chapter dots */
      #chapters {
        left: 24px;
        bottom: 24px;
      }

      /* Scroll hint */
      #scroll-hint {
        right: 24px;
        bottom: 24px;
      }
    }

    /* =====================================================
       SHORT VIEWPORT  ≤ 500px tall
       Landscape mobile and compact tablet landscape.
       Pull text and chapters up less to prevent crowding.
    ===================================================== */
    @media (max-height: 500px) {
      #text-overlay {
        bottom: 52px;
      }

      #chapters {
        bottom: 12px;
      }

      /* Scroll hint adds no value in landscape — screen
         is already short and the hint cuts into content */
      #scroll-hint {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- ======================================================
       SITE CONFIG — edit all content here
  ====================================================== -->
  <script type="application/json" id="site-config">
  {
    "brand": "FORMA",

    "totalFrames": 360,
    "frameDir":    "content/images/sequence/",
    "framePrefix": "frame_",
    "framePad":    3,
    "frameExt":    ".jpg",

    "scrollPerFrame": 8,

    "intro": "content/videos/intro.mp4",

    "stops": [
      { "frame": 0,   "video": "content/videos/video-01.mp4", "num": "01", "label": "Origin",  "body": "Every motion begins in stillness. The pause before a gesture holds all its potential energy." },
      { "frame": 60,  "video": "content/videos/video-02.mp4", "num": "02", "label": "Impulse", "body": "Stillness choosing direction. The invisible decision that precedes the visible act." },
      { "frame": 120, "video": "content/videos/video-03.mp4", "num": "03", "label": "Tension", "body": "Force meeting resistance creates form. The point of maximum stress is where beauty lives." },
      { "frame": 180, "video": "content/videos/video-04.mp4", "num": "04", "label": "Release", "body": "The moment tension becomes flow. Not an ending, but a transition into something new." },
      { "frame": 240, "video": "content/videos/video-05.mp4", "num": "05", "label": "Trace",   "body": "The line motion leaves in passing. Gesture becoming geometry before it dissolves." },
      { "frame": 300, "video": "content/videos/video-06.mp4", "num": "06", "label": "Echo",    "body": "What remains after movement passes. The shape the air holds after the hand has gone." }
    ]
  }
  </script>

  <!-- Page-level heading (screen readers only) -->
  <h1 class="sr-only">FORMA</h1>

  <!-- NAV -->
  <nav id="nav" aria-label="Main navigation">
    <a href="#" class="nav-brand" aria-label="FORMA — home">FORMA</a>
    <ul class="nav-links">
      <li><a href="#">Emotion</a></li>
      <li><a href="#">Ownership</a></li>
      <li><a href="#">Action</a></li>
      <li><a href="#">Location</a></li>
    </ul>
    <a href="#" class="nav-cta">Contact</a>
  </nav>

  <!-- LOADING -->
  <div id="loading">
    <span id="loading-brand">FORMA</span>
    <div id="loading-track"><div id="loading-fill"></div></div>
  </div>

  <!-- INTRO VIDEO -->
  <div id="intro-overlay">
    <video id="intro-video" muted playsinline preload="auto"></video>
  </div>

  <!-- STOP VIDEO -->
  <div id="stop-overlay">
    <video id="stop-video" muted playsinline preload="none"></video>
  </div>

  <!-- CANVAS -->
  <div id="scroll-wrapper">
    <div id="stage">
      <canvas id="canvas" role="img" aria-label="Scroll-driven motion sequence"></canvas>
    </div>
  </div>

  <!-- TEXT OVERLAY (above stop video) -->
  <div id="text-overlay"></div>

  <!-- CHAPTER INDICATORS -->
  <div id="chapters" aria-hidden="true"></div>

  <!-- SCROLL HINT -->
  <div id="scroll-hint" aria-hidden="true">
    <div class="hint-line"></div>
    <span class="hint-label">Scroll</span>
  </div>

  <script>
    /* =====================================================
       CONFIG
    ===================================================== */
    const C = JSON.parse(document.getElementById('site-config').textContent);

    /* =====================================================
       ELEMENTS
    ===================================================== */
    const loadingEl    = document.getElementById('loading');
    const loadingFill  = document.getElementById('loading-fill');
    const introOverlay = document.getElementById('intro-overlay');
    const introVideo   = document.getElementById('intro-video');
    const stopOverlay  = document.getElementById('stop-overlay');
    const stopVideoEl  = document.getElementById('stop-video');
    const canvas       = document.getElementById('canvas');
    const ctx          = canvas.getContext('2d');
    const textOverlay  = document.getElementById('text-overlay');
    const chaptersEl   = document.getElementById('chapters');
    const scrollHint   = document.getElementById('scroll-hint');

    document.title = C.brand;
    document.getElementById('loading-brand').textContent = C.brand;

    /* =====================================================
       STATE
    ===================================================== */
    const frames          = new Array(C.totalFrames); // raw Image elements
    const bitmaps         = new Array(C.totalFrames); // pre-decoded ImageBitmaps (off-thread)
    let currentFrame      = -1;
    let isLocked          = false;
    let currentStopIndex  = 0;     // which stop the user is currently at
    let isTransitioning   = false; // true while frame tween is running
    let inputCooldown     = true;  // blocks nav until boot stop-0 finishes
    let isDragging        = false; // true during click-hold drag scrubbing
    let dragStartY        = 0;
    let dragStartFrame    = 0;
    let touchStartY       = 0;
    let touchTriggered    = false;
    let prevChapterZone   = -1;    // last zone passed to updateChapters
    let textVisible       = false; // guard: skip hideText work when already hidden
    let cssWidth          = 0;     // logical canvas size (excludes DPR)
    let cssHeight         = 0;
    let resizeTimer       = null;  // debounce handle for resize
    let skipCurrentVideo  = null;  // set during playStopVideo; call to interrupt

    /* =====================================================
       CANVAS RESIZE — HiDPI-aware, debounced 150ms
    ===================================================== */
    function resizeCanvas() {
      const dpr  = window.devicePixelRatio || 1;
      cssWidth   = window.innerWidth;
      cssHeight  = window.innerHeight;
      canvas.width          = Math.round(cssWidth  * dpr);
      canvas.height         = Math.round(cssHeight * dpr);
      canvas.style.width    = cssWidth  + 'px';
      canvas.style.height   = cssHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in logical pixels
      if (currentFrame >= 0) renderFrame(currentFrame);
    }
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resizeCanvas, 150);
    });
    resizeCanvas();

    /* =====================================================
       FRAME PATH
    ===================================================== */
    function framePath(i) {
      return C.frameDir
           + C.framePrefix
           + String(i).padStart(C.framePad, '0')
           + C.frameExt;
    }

    /* =====================================================
       RENDER FRAME — bitmap → img → placeholder
    ===================================================== */
    function renderFrame(index) {
      currentFrame = index;
      const bmp = bitmaps[index];
      if (bmp) {
        ctx.drawImage(bmp, 0, 0, cssWidth, cssHeight);
        return;
      }
      const img = frames[index];
      if (img && img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, 0, 0, cssWidth, cssHeight);
      } else {
        // Gradient placeholder while assets are being produced
        const hue = 230 + (index / C.totalFrames) * 25;
        const l   = 10 + (index / C.totalFrames) * 6;
        ctx.fillStyle = `oklch(${l.toFixed(1)}% 0.015 ${hue.toFixed(0)})`;
        ctx.fillRect(0, 0, cssWidth, cssHeight);
      }
    }

    /* =====================================================
       LOAD FRAMES — non-blocking, off-thread ImageBitmap decode
    ===================================================== */
    function loadFramesInBackground() {
      let framesSettled = 0;

      function onSettled() {
        framesSettled++;
        const pct = Math.round((framesSettled / C.totalFrames) * 100);
        loadingFill.style.width = pct + '%';
      }

      for (let i = 0; i < C.totalFrames; i++) {
        const img = new Image();
        img.onload = () => {
          if (typeof createImageBitmap === 'function') {
            createImageBitmap(img)
              .then(bmp => { bitmaps[i] = bmp; })
              .catch(() => { /* bitmap failed — img fallback still works */ })
              .finally(() => {
                onSettled();
                if (i === currentFrame) renderFrame(i);
              });
          } else {
            onSettled();
            if (i === currentFrame) renderFrame(i);
          }
        };
        img.onerror = onSettled; // 404s still advance the bar
        img.src     = framePath(i);
        frames[i]   = img;
      }
    }

    /* =====================================================
       BUILD TEXT OVERLAY
       Creates one .stop-text div per stop, stacked.
    ===================================================== */
    const textEls = [];

    C.stops.forEach((stop, i) => {
      const div = document.createElement('div');
      div.className = 'stop-text';
      const wordSpans = stop.body
        ? stop.body.split(' ').map(w => `<span class="word">${w}</span>`).join(' ')
        : '';
      div.innerHTML = stop.label
        ? `<p class="stop-num">${stop.num}</p>
           <h2 class="stop-heading">${stop.label}</h2>
           ${wordSpans ? `<p class="stop-body">${wordSpans}</p>` : ''}`
        : `<p class="stop-num">${stop.num}</p>`;
      textOverlay.appendChild(div);
      textEls.push(div);
    });

    /* =====================================================
       BUILD CHAPTER INDICATORS
    ===================================================== */
    const chapDots = [];

    C.stops.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'chap-dot';
      chaptersEl.appendChild(dot);
      chapDots.push(dot);
    });

    /* =====================================================
       SHOW STOP TEXT — time-driven, plays during stop video

       Stagger schedule:
         0 ms  : num label fades + rises
         120 ms: heading fades + rises
         320 ms + (wi × 45 ms): each body word, one by one

       Called from playStopVideo after the overlay fades in.
       hideText() kills everything instantly for scroll.
    ===================================================== */
    function showStopText(stopIndex) {
      textVisible = true;
      // Reset all — instant, no transitions
      textEls.forEach(el => {
        el.style.opacity = '0';
        el.style.setProperty('--bd-dur',     '0s');
        el.style.setProperty('--bd-opacity', '0');
        el.querySelectorAll('.stop-num, .stop-heading, .word').forEach(c => {
          c.style.transition = 'none';
          c.style.opacity    = '0';
          c.style.transform  = 'translateY(10px)';
        });
      });

      const el = textEls[stopIndex];
      el.style.opacity = '1';

      // Next frame: enable slow fade-in for the pill backdrop
      requestAnimationFrame(() => {
        el.style.setProperty('--bd-dur',     '0.55s');
        el.style.setProperty('--bd-opacity', '1');
      });

      const queue = [];
      const numEl  = el.querySelector('.stop-num');
      const headEl = el.querySelector('.stop-heading');
      if (numEl)  queue.push({ node: numEl,  delay: 0   });
      if (headEl) queue.push({ node: headEl, delay: 120 });
      el.querySelectorAll('.word').forEach((w, wi) => {
        queue.push({ node: w, delay: 320 + wi * 45 });
      });

      queue.forEach(({ node, delay }) => {
        setTimeout(() => {
          node.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          node.style.opacity    = '1';
          node.style.transform  = 'translateY(0)';
        }, delay);
      });
    }

    // Hide all text instantly — called whenever scroll resumes.
    // Guard: skips DOM work when text is already hidden (called every RAF tick).
    function hideText() {
      if (!textVisible) return;
      textVisible = false;
      textEls.forEach(el => {
        el.style.opacity = '0';
        // Kill backdrop instantly (no linger during navigation)
        el.style.setProperty('--bd-dur',     '0s');
        el.style.setProperty('--bd-opacity', '0');
        el.querySelectorAll('.stop-num, .stop-heading, .word').forEach(c => {
          c.style.transition = 'none';
          c.style.opacity    = '0';
          c.style.transform  = 'translateY(10px)';
        });
      });
    }

    /* =====================================================
       UPDATE CHAPTER DOTS
       Takes the zone index directly (0–5) so it can short-circuit
       when the zone hasn't changed — avoids 6 classList mutations
       every RAF frame during scroll.
    ===================================================== */
    function updateChapters(zone) {
      if (zone === prevChapterZone) return;
      prevChapterZone = zone;
      chapDots.forEach((dot, i) => {
        dot.classList.toggle('is-active', i === zone);
        dot.classList.toggle('is-done',   i < zone);
      });
    }

    /* =====================================================
       SCROLL LOCK / UNLOCK
    ===================================================== */
    function lockScroll() {
      isLocked = true;
      document.documentElement.style.overflow = 'hidden';
    }

    function unlockScroll() {
      document.documentElement.style.overflow = '';
      isLocked = false;
    }

    /* =====================================================
       PLAY STOP VIDEO — will-change promoted/demoted per animation

       finish(immediate):
         false — natural end: wait 400 ms for overlay fade, then onDone()
         true  — user-interrupted: unlock scroll immediately, fade runs in bg

       startTimer / showTimer are stored so both can be cancelled if the
       user interrupts before the video or text animation begins.
    ===================================================== */
    function playStopVideo(stopIndex, onDone) {
      stopVideoEl.src = C.stops[stopIndex].video;
      stopVideoEl.load();

      let done       = false;
      let startTimer = null;
      let showTimer  = null;

      function finish(immediate) {
        if (done) return;
        done = true;
        clearTimeout(startTimer);
        clearTimeout(showTimer);
        skipCurrentVideo = null;
        stopVideoEl.removeEventListener('ended', onEnded);
        stopVideoEl.removeEventListener('error', onError);
        stopOverlay.classList.remove('in');
        stopVideoEl.pause();
        if (immediate) {
          // Interrupted: unlock now so scroll resumes during overlay fade-out
          stopVideoEl.src = '';
          stopOverlay.style.willChange = '';
          onDone();
        } else {
          // Natural end: wait for overlay to fade, then unlock
          setTimeout(() => {
            stopVideoEl.src = '';
            stopOverlay.style.willChange = '';
            onDone();
          }, 400);
        }
      }

      function onEnded() { finish(false); }
      function onError() { finish(false); }

      skipCurrentVideo = () => finish(true);

      stopVideoEl.addEventListener('ended', onEnded);
      stopVideoEl.addEventListener('error', onError);

      stopOverlay.style.willChange = 'opacity';
      stopOverlay.classList.add('in');
      startTimer = setTimeout(() => {
        stopVideoEl.play().catch(() => finish(false));
        showTimer = setTimeout(() => showStopText(stopIndex), 500);
      }, 400);
    }

    /* =====================================================
       ZONE HELPER — for chapter dot tracking only
    ===================================================== */
    function getZone(frame) {
      for (let i = C.stops.length - 1; i >= 0; i--) {
        if (frame >= C.stops[i].frame) return i;
      }
      return 0;
    }

    /* =====================================================
       FRAME ANIMATION
       Tweens canvas from one frame to another.
       Ease-out-quart; duration scales with distance (250–650 ms).
    ===================================================== */
    function animateToFrame(fromFrame, toFrame, onDone) {
      if (fromFrame === toFrame) { onDone(); return; } // already there
      const distance = Math.abs(toFrame - fromFrame);
      const duration = Math.min(Math.max(distance * 3.5, 250), 650);
      const startTime = performance.now();

      (function tick(now) {
        const t     = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 4); // ease-out-quart
        renderFrame(Math.round(fromFrame + (toFrame - fromFrame) * eased));
        if (t < 1) requestAnimationFrame(tick);
        else { renderFrame(toFrame); onDone(); }
      })(performance.now());
    }

    /* =====================================================
       NAVIGATION
       One gesture = advance one stop (forward or backward).
       Forward: tween + play stop video.
       Backward: tween only, no video replay.
    ===================================================== */
    function goToStop(targetIndex) {
      if (isTransitioning || isLocked || inputCooldown) return;
      targetIndex = Math.max(0, Math.min(C.stops.length - 1, targetIndex));
      if (targetIndex === currentStopIndex) return;

      const forward   = targetIndex > currentStopIndex;
      isTransitioning = true;
      inputCooldown   = true;

      const fromFrame = currentFrame >= 0 ? currentFrame : C.stops[currentStopIndex].frame;
      const toFrame   = C.stops[targetIndex].frame;

      animateToFrame(fromFrame, toFrame, () => {
        currentStopIndex = targetIndex;
        isTransitioning  = false;
        updateChapters(currentStopIndex);
        hideText();

        if (forward) {
          lockScroll();
          playStopVideo(currentStopIndex, () => {
            unlockScroll();
            setTimeout(() => { inputCooldown = false; }, 200);
          });
        } else {
          // Backward: no video replay — instant re-enable
          setTimeout(() => { inputCooldown = false; }, 280);
        }
      });
    }

    function goNext() { goToStop(currentStopIndex + 1); }
    function goPrev() { goToStop(currentStopIndex - 1); }

    /* =====================================================
       VIDEO INTERRUPT
       While a stop video is playing, any scroll gesture
       skips it so the user can continue navigating.
    ===================================================== */
    function tryInterrupt() {
      if (!isLocked || !skipCurrentVideo) return;
      hideText();
      skipCurrentVideo();
    }

    /* =====================================================
       INPUT HANDLERS — wheel · touch · keyboard
    ===================================================== */
    // Wheel (mouse + trackpad)
    window.addEventListener('wheel', e => {
      if (isLocked) { tryInterrupt(); return; }
      if (e.deltaY > 0) goNext();
      else if (e.deltaY < 0) goPrev();
    }, { passive: true });

    // Touch swipe
    window.addEventListener('touchstart', e => {
      touchStartY    = e.touches[0].clientY;
      touchTriggered = false;
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      if (touchTriggered) return;
      const dy = touchStartY - e.touches[0].clientY;
      if (Math.abs(dy) < 24) return; // minimum swipe distance
      touchTriggered = true;
      if (isLocked) { tryInterrupt(); return; }
      if (dy > 0) goNext();
      else        goPrev();
    }, { passive: true });

    // Keyboard
    window.addEventListener('keydown', e => {
      const down = ['ArrowDown', 'PageDown', ' '].includes(e.key);
      const up   = ['ArrowUp',   'PageUp'       ].includes(e.key);
      if (!down && !up) return;
      e.preventDefault();
      if (isLocked) { tryInterrupt(); return; }
      if (down) goNext();
      else      goPrev();
    });

    /* =====================================================
       MOUSE DRAG SCRUBBING
       Click-hold + drag up to go forward, down to go back.
       Scrubs freely through all frames; on release snaps to
       the nearest stop (plays video only when moving forward).

       DRAG_PX_PER_FRAME — pixels of drag per frame.
       At 4px: 240 px drag spans one stop (60 frames).
    ===================================================== */
    const DRAG_PX_PER_FRAME = 4;

    const stage = document.getElementById('stage');

    stage.addEventListener('mousedown', e => {
      if (isLocked || isTransitioning || inputCooldown) return;
      e.preventDefault(); // suppress text selection
      isDragging     = true;
      dragStartY     = e.clientY;
      dragStartFrame = currentFrame >= 0 ? currentFrame : C.stops[currentStopIndex].frame;
      document.body.classList.add('is-dragging');
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      // If button was released outside the window, treat as mouseup
      if (e.buttons === 0) { window.dispatchEvent(new MouseEvent('mouseup')); return; }
      const dy         = dragStartY - e.clientY; // drag up = positive = forward
      const frameDelta = Math.round(dy / DRAG_PX_PER_FRAME);
      const target     = Math.max(0, Math.min(C.totalFrames - 1, dragStartFrame + frameDelta));
      renderFrame(target);
      updateChapters(getZone(target));
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      document.body.classList.remove('is-dragging');

      const landingFrame = currentFrame >= 0 ? currentFrame : C.stops[currentStopIndex].frame;

      // Find nearest stop to landing position
      let nearestIndex = 0;
      let nearestDist  = Infinity;
      C.stops.forEach((stop, i) => {
        const dist = Math.abs(landingFrame - stop.frame);
        if (dist < nearestDist) { nearestDist = dist; nearestIndex = i; }
      });

      const prevStopIndex = currentStopIndex;
      const snapFrame     = C.stops[nearestIndex].frame;
      const sameStop      = nearestIndex === prevStopIndex;
      const forward       = nearestIndex  >  prevStopIndex;

      inputCooldown   = true;
      isTransitioning = true;

      animateToFrame(landingFrame, snapFrame, () => {
        currentStopIndex = nearestIndex;
        isTransitioning  = false;
        updateChapters(currentStopIndex);
        hideText();

        if (forward) {
          // Landing on a new stop ahead → play its video
          lockScroll();
          playStopVideo(currentStopIndex, () => {
            unlockScroll();
            setTimeout(() => { inputCooldown = false; }, 200);
          });
        } else {
          // Same stop or moving backward → no video, quick re-enable
          setTimeout(() => { inputCooldown = false; }, 200);
        }
      });
    });

    /* =====================================================
       PLAY INTRO
    ===================================================== */
    function playIntro(onDone) {
      introVideo.src = C.intro;

      function finish() {
        introVideo.removeEventListener('ended', finish);
        introVideo.removeEventListener('error', finish);
        introOverlay.classList.add('out');
        setTimeout(() => {
          introOverlay.style.display = 'none';
          onDone();
        }, 500);
      }

      introVideo.addEventListener('ended', finish, { once: true });
      introVideo.addEventListener('error', finish, { once: true });
      introVideo.load();
      introVideo.play().catch(finish);
    }

    /* =====================================================
       ENABLE NAVIGATION — called once after boot stop-0
    ===================================================== */
    function enableNav() {
      inputCooldown = false;
      scrollHint.classList.add('visible');
      // Dismiss hint on first navigation gesture
      const hideHint = () => scrollHint.classList.remove('visible');
      window.addEventListener('wheel',      hideHint, { once: true, passive: true });
      window.addEventListener('touchstart', hideHint, { once: true, passive: true });
      window.addEventListener('keydown',    hideHint, { once: true });
    }

    /* =====================================================
       BOOT
    ===================================================== */
    function boot() {
      // Wrapper is viewport-height only — navigation is gesture-driven.
      document.getElementById('scroll-wrapper').style.height = window.innerHeight + 'px';

      loadFramesInBackground();
      renderFrame(0);
      updateChapters(0);

      loadingEl.classList.add('out');
      setTimeout(() => {
        loadingEl.style.display = 'none';

        playIntro(() => {
          hideText();
          lockScroll();
          playStopVideo(0, () => {
            currentStopIndex = 0;
            unlockScroll();
            enableNav();
          });
        });
      }, 600);
    }

    boot();
  </script>
</body>
</html>
