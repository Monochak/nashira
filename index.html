<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORMA · Stillness</title>
  <meta name="description" content="FORMA. Un desarrollo residencial que se experimenta antes de habitarse.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2314141a'/%3E%3Ccircle cx='32' cy='32' r='10' fill='%23e09a4e'/%3E%3C/svg%3E">
  <!-- OG: reemplazar og:image con URL absoluta al definir el dominio de producción -->
  <meta property="og:title" content="FORMA">
  <meta property="og:description" content="Un desarrollo residencial que se experimenta antes de habitarse.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="content/images/sequence/frame_000.jpg">
  <!-- Prefetch Emotion so it's ready when we navigate -->
  <link rel="prefetch" href="emotion.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dim:    oklch(28% 0.009 250);
      --muted:  oklch(48% 0.01  250);
      --accent: oklch(70% 0.175  52);
      --border: oklch(17% 0.01  250);
      --font-display: 'Big Shoulders Display', 'Arial Black', system-ui, sans-serif;
      --font-body:    'Barlow', system-ui, -apple-system, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: oklch(18% 0.008 250); /* grafito — punto de partida del reveal */
      font-family: var(--font-body);
      font-optical-sizing: auto;
      -webkit-font-smoothing: antialiased;
    }

    /* Brand — esquina superior izquierda */
    #loading-brand {
      position: fixed;
      top: 40px;
      left: 64px;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--dim);
      z-index: 2;
    }

    /* Heading — domina el frame */
    #loading-heading {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -52%);
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6.5vw, 6.5rem);
      font-weight: 700;
      letter-spacing: 0.5em;
      line-height: 1;
      color: oklch(18% 0.008 250); /* grafito — invisible sobre fondo grafito, emerge al aclarar */
      white-space: nowrap;
      opacity: 0;
      filter: blur(20px);
      z-index: 2;
    }

    /* Tagline — inferior centro */
    #loading-tagline {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8125rem;
      font-weight: 400;
      color: oklch(28% 0.009 250);
      letter-spacing: 0.04em;
      white-space: nowrap;
      z-index: 2;
    }

    .loading-word {
      display: inline;
      opacity: 0;
      transform: translateY(10px);
    }

    /* Barra de progreso — borde inferior */
    #loading-track {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--border);
      z-index: 2;
    }

    #loading-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    /* Porcentaje — inferior derecha */
    #loading-pct {
      position: fixed;
      bottom: 20px;
      right: 48px;
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--dim);
      font-variant-numeric: tabular-nums;
      z-index: 2;
    }

    @media (max-width: 767px) {
      #loading-brand { left: 24px; }
      #loading-pct   { right: 24px; }
    }
  </style>
</head>
<body>

  <span id="loading-brand">FORMA</span>
  <h1 id="loading-heading" lang="en">Stillness</h1>
  <p id="loading-tagline" lang="en">
    <span class="loading-word">Every</span>
    <span class="loading-word">motion</span>
    <span class="loading-word">begins</span>
    <span class="loading-word">in</span>
    <span class="loading-word">stillness.</span>
  </p>
  <div id="loading-track"><div id="loading-fill"></div></div>
  <span id="loading-pct">0%</span>

  <script>
    // ── Si Stillness ya se mostró en esta sesión, ir directo a Emotion
    if (sessionStorage.getItem('stillness_shown')) {
      window.location.replace('emotion.html');
    }

    const body        = document.body;
    const loadingFill = document.getElementById('loading-fill');
    const loadingPct  = document.getElementById('loading-pct');
    const heading     = document.getElementById('loading-heading');

    // ── Frames críticos a precargar en segundo plano (6 stop frames)
    const CRITICAL_FRAMES = [
      'content/images/sequence/frame_000.jpg',
      'content/images/sequence/frame_060.jpg',
      'content/images/sequence/frame_120.jpg',
      'content/images/sequence/frame_180.jpg',
      'content/images/sequence/frame_240.jpg',
      'content/images/sequence/frame_300.jpg',
    ];

    function preloadImage(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = img.onerror = resolve;
        img.src = src;
      });
    }

    // Precarga de video usando elemento <video> para que quede en caché
    // compartida con los elementos <video> de emotion.html.
    function preloadVideo(src) {
      return new Promise(resolve => {
        const v = document.createElement('video');
        v.preload = 'auto';
        v.muted   = true;
        v.src     = src;
        v.oncanplaythrough = resolve;
        v.onerror          = resolve;
        setTimeout(resolve, 15000); // 15s de timeout máximo
        v.load();
      });
    }

    // ── Animación del loader: ease-out-cubic 0→95% en 5s
    const LOADER_MS = 5000;
    const loadStart = performance.now();
    let   loaderRaf = null;

    function animateLoader(now) {
      const t     = Math.min((now - loadStart) / LOADER_MS, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const pct   = Math.round(eased * 95);
      loadingFill.style.width = pct + '%';
      loadingPct.textContent  = pct + '%';
      if (t < 1) loaderRaf = requestAnimationFrame(animateLoader);
    }
    loaderRaf = requestAnimationFrame(animateLoader);

    // ── REVEAL 1: fondo grafito → blanco-beige en 3s (comienza de inmediato)
    body.style.transition      = 'background-color 3s ease';
    body.style.backgroundColor = 'oklch(96% 0.006 80)';

    // ── REVEAL 2: "Stillness" emerge mientras el fondo aclara
    setTimeout(() => {
      heading.style.transition = 'opacity 2.5s ease, filter 2.5s ease';
      heading.style.opacity    = '1';
      heading.style.filter     = 'blur(0px)';
    }, 300);

    // ── REVEAL 3: tagline aparece sobre el fondo ya claro
    document.querySelectorAll('.loading-word').forEach((word, i) => {
      setTimeout(() => {
        word.style.transition = 'opacity 0.85s ease, transform 0.85s ease';
        word.style.opacity    = '1';
        word.style.transform  = 'translateY(0)';
      }, 3200 + i * 220);
    });

    // ── Precarga de frames críticos + video inicial + espera mínima de 5.4s
    const minWait = new Promise(r => setTimeout(r, LOADER_MS + 400));
    Promise.all([
      ...CRITICAL_FRAMES.map(preloadImage),
      preloadVideo('content/videos/video-01.mp4'),
      minWait
    ]).then(() => {
      // Barra a 100%
      cancelAnimationFrame(loaderRaf);
      loadingFill.style.transition = 'width 0.4s ease';
      loadingFill.style.width      = '100%';
      loadingPct.textContent       = '100%';

      // Pausa breve en 100%, luego oscurecer y navegar
      setTimeout(() => {
        body.style.transition      = 'background-color 1.5s ease';
        body.style.backgroundColor = 'oklch(9% 0.008 250)';

        setTimeout(() => {
          sessionStorage.setItem('stillness_shown', '1');
          window.location.href = 'emotion.html';
        }, 1500);
      }, 800);
    });
  </script>
</body>
</html>
