  <style>

  /* ============================================================
     NASHIRA RESIDENCIAL — reveal de logo (motion graphics web)
     Constelacion REAL (de Constelacion.png) + lettering REAL vectorizado.
     Concepto: "El cielo revela la constelacion de Capricornio".
     Uso: splash / intro de carga (frecuencia rara -> motion expresivo).
     Pesos: Jakub (polish) + Jhey (constelacion + 1 acento). Emil: sin loops.
     ============================================================ */
  :root {
    --azul:#3b4a84; --cielo:#edf8fe; --durazno:#f7ae7b;
    --terracota:#ba4627; --cafe:#6b5340; --noche:#121127;
    --ease-out: cubic-bezier(0.22,1,0.36,1);
    --ease-soft:cubic-bezier(0.16,1,0.30,1);
    --ease-pop: cubic-bezier(0.34,1.56,0.64,1);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    display:grid;place-items:center;
    font-family:system-ui,sans-serif;
    background:radial-gradient(140% 120% at 50% 6%, #44558f 0%, #25295a 38%, var(--noche) 100%);
    color:var(--cielo);overflow:hidden;
  }

  /* ---------- Bloque embebible ---------- */
  .nashira-logo{position:relative;width:min(88vw,520px);text-align:center;user-select:none}

  /* polvo estelar de fondo (decorativo, estatico) */
  .dust{position:absolute;inset:-34% -8% -12%;pointer-events:none;z-index:0;opacity:0;
        animation:dust-in 1.2s var(--ease-out) .1s both}
  .dust i{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--cielo);
          opacity:var(--a,.5);box-shadow:0 0 4px rgba(237,248,254,.6)}

  /* ---------- Direccion (eyebrow) ---------- */
  .addr{position:relative;z-index:1;margin:0 0 26px;
        font-family:"Outfit",system-ui,sans-serif;font-weight:300;
        font-size:clamp(9px,1.7vw,11px);letter-spacing:.34em;text-indent:.34em;
        text-transform:uppercase;color:rgba(237,248,254,.85);
        opacity:0;animation:addr-in .55s var(--ease-soft) 2.85s both}  /* 4o: MANAGUA */

  /* ---------- Constelacion ---------- */
  .constelacion{position:relative;z-index:1;width:63%;margin:0 auto 22px;display:block;overflow:visible}
  .constelacion .link{
    fill:none;stroke:var(--cielo);stroke-width:2.2;stroke-linecap:butt;
    stroke-dasharray:8 9;                    /* guiones, como la marca */
    opacity:0;
    animation:link-in .42s var(--ease-out) both;
    animation-delay:calc(.78s + var(--i)*.06s);   /* 1o: constelacion (lineas) */
  }
  .constelacion .star{
    fill:var(--cielo);transform-box:fill-box;transform-origin:center;opacity:0;
    filter:drop-shadow(0 0 6px rgba(237,248,254,.7));
    animation:twinkle .55s var(--ease-pop) both;
    animation-delay:calc(.15s + var(--i)*.06s);   /* 1o: constelacion (estrellas) */
  }
  .constelacion .spk{filter:drop-shadow(0 0 7px rgba(237,248,254,.85))}

  /* ---------- Lockup (lettering real) ---------- */
  .lockup{position:relative;z-index:1;display:block;width:100%;height:auto;overflow:visible}
  #word path{fill:var(--cielo)}
  #res  path{fill:var(--cielo)}
  #spk  path{fill:var(--durazno)}          /* la 4a estrella: "la afortunada" */

  .wipe{transform-box:fill-box;transform-origin:left center;transform:scaleX(0);
        animation:wipe .8s var(--ease-out) 1.7s forwards}          /* 2o: NASHIRA */
  #spk{transform-box:fill-box;transform-origin:center;opacity:0;
       filter:drop-shadow(0 0 7px rgba(247,174,123,.85));
       animation:spark-pop .5s var(--ease-pop) 3.2s both}          /* 5o: estrella roja (isotipo), al final */
  #res{transform-box:fill-box;transform-origin:center;opacity:0;transform:translateY(7px);
       animation:rise-in .5s var(--ease-soft) 2.5s both}           /* 3o: RESIDENCIAL */

  /* ============================ KEYFRAMES ============================ */
  @keyframes twinkle{0%{opacity:0;transform:scale(.35)}60%{opacity:1}100%{opacity:1;transform:scale(1)}}
  @keyframes link-in{to{opacity:.55}}
  @keyframes wipe{to{transform:scaleX(1)}}
  @keyframes spark-pop{0%{opacity:0;transform:scale(.2) rotate(-35deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes rise-in{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
  @keyframes dust-in{from{opacity:0}to{opacity:.9}}
  @keyframes addr-in{from{opacity:0;transform:translateY(-4px)}to{opacity:.85;transform:translateY(0)}}

  /* ===== Accesibilidad: prefers-reduced-motion (obligatorio) ===== */
  @media (prefers-reduced-motion: reduce){
    .nashira-logo *{animation:none !important;transition:none !important}
    .dust,.constelacion .star,#spk,#res{opacity:1 !important;transform:none !important}
    .addr{opacity:.85 !important;transform:none !important}
    .constelacion .link{opacity:.55 !important}
    .wipe{transform:scaleX(1) !important}
  }

  /* ---------- preloader: barra de marca ---------- */
  #loading-track{position:fixed;bottom:0;left:0;width:100%;height:1px;
    background:rgba(237,248,254,.12);z-index:5}
  #loading-fill{height:100%;width:0;
    background:linear-gradient(90deg,var(--durazno),var(--cielo));
    box-shadow:0 0 8px rgba(247,174,123,.5);transition:width .3s ease}
  #loading-pct{position:fixed;bottom:18px;right:26px;
    font-family:"Outfit",system-ui,sans-serif;font-size:9px;font-weight:300;
    letter-spacing:.2em;color:rgba(237,248,254,.45);
    font-variant-numeric:tabular-nums;z-index:5}
  #exit-veil{position:fixed;inset:0;background:#0d0c1a;opacity:0;
    pointer-events:none;z-index:9;transition:opacity .9s ease}
  @media (max-width:767px){#loading-pct{right:18px}}
</style>

  <div id="loading-track"><div id="loading-fill"></div></div>
  <span id="loading-pct">0%</span>
  <div id="exit-veil"></div>

  <script>
  (function(){
    // sessionStorage blindado (modos privados lanzan SecurityError)
    var safeStorage = {
      get:function(k){try{return sessionStorage.getItem(k);}catch(e){return null;}},
      set:function(k,v){try{sessionStorage.setItem(k,v);}catch(e){}}
    };
    // si el intro ya se vio en esta sesion, ir directo a Emotion
    if (safeStorage.get('nashira_intro_shown')) { window.location.replace('emotion.html'); return; }

    var loadingFill = document.getElementById('loading-fill');
    var loadingPct  = document.getElementById('loading-pct');
    var veil        = document.getElementById('exit-veil');

    // frames criticos + primer video (se precargan mientras corre el reveal)
    var CRITICAL_FRAMES = [
      'content/images/sequence/frame_000.jpg',
      'content/images/sequence/frame_060.jpg',
      'content/images/sequence/frame_120.jpg',
      'content/images/sequence/frame_180.jpg',
      'content/images/sequence/frame_240.jpg',
      'content/images/sequence/frame_300.jpg'
    ];
    function preloadImage(src){return new Promise(function(res){var i=new Image();i.onload=i.onerror=res;i.src=src;});}
    function preloadVideo(src){return new Promise(function(res){var v=document.createElement('video');v.preload='auto';v.muted=true;v.src=src;v.oncanplaythrough=res;v.onerror=res;setTimeout(res,15000);v.load();});}

    // barra 0->95% en LOADER_MS (ease-out-cubic)
    var LOADER_MS = 4500;
    var loadStart = performance.now();
    var loaderRaf = null;
    function animateLoader(now){
      var t = Math.min((now-loadStart)/LOADER_MS,1);
      var eased = 1-Math.pow(1-t,3);
      var pct = Math.round(eased*95);
      loadingFill.style.width = pct+'%';
      loadingPct.textContent  = pct+'%';
      if (t<1) loaderRaf = requestAnimationFrame(animateLoader);
    }
    loaderRaf = requestAnimationFrame(animateLoader);

    // navegar cuando: reveal+barra terminaron Y los assets estan listos
    var minWait = new Promise(function(r){setTimeout(r, LOADER_MS+400);});
    Promise.all(CRITICAL_FRAMES.map(preloadImage).concat([
      preloadVideo('content/videos/video-01.mp4'), minWait
    ])).then(function(){
      cancelAnimationFrame(loaderRaf);
      loadingFill.style.transition = 'width .4s ease';
      loadingFill.style.width = '100%';
      loadingPct.textContent  = '100%';
      setTimeout(function(){
        veil.style.opacity = '1';            // fundido a oscuro -> Emotion arranca en grafito
        setTimeout(function(){
          safeStorage.set('nashira_intro_shown','1');
          window.location.href = 'emotion.html';
        }, 900);
      }, 700);
    });
  })();
  </script>

  <script src="pwa.js"></script>
