<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORMA — Ownership</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             oklch(18% 0.008 250);
      --text:           oklch(93% 0.005 250);
      --text-secondary: oklch(88% 0.006 250);
      --muted:          oklch(48% 0.01  250);
      --dim:            oklch(28% 0.009 250);
      --accent:         oklch(70% 0.175  52);
      --border:         oklch(17% 0.01  250);
      --glass-bg:       oklch(13% 0.01  250 / 0.72);
      --glass-border:   oklch(25% 0.012 250 / 0.55);
      --label:          oklch(62% 0.01  250);       /* uppercase labels */
      --panel-border:   oklch(28% 0.012 250 / 0.45);/* panel internal dividers */
      --font-display:   'Big Shoulders Display', 'Arial Black', system-ui, sans-serif;
      --font-body:      'Barlow', system-ui, -apple-system, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── CANVAS ─────────────────────────────────────────────────────────── */
    #canvas-container {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease-out;
    }
    #canvas-container.visible { opacity: 1; }

    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── CANVAS DIM (unit panel backdrop) ──────────────────────────────── */
    #canvas-dim {
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease-out;
      z-index: 10;
    }
    #canvas-dim.active {
      opacity: 0.55;
      pointer-events: auto;
      cursor: pointer;
    }

    /* ── LOADING ─────────────────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.7s ease-out;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.32em;
      color: oklch(93% 0.005 250 / 0.12);
      text-transform: uppercase;
    }

    .loading-bar-track {
      width: 180px;
      height: 1px;
      background: var(--border);
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.08s linear;
    }

    .loading-label {
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── FLOOR LIST (left sidebar) ──────────────────────────────────────── */
    #floor-list {
      position: fixed;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }
    #floor-list.visible { opacity: 1; }

    .floor-item {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      padding: 3px 0;
      user-select: none;
    }

    .floor-number {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.10em;
      color: var(--muted);
      min-width: 22px;
      text-align: right;
      transition: color 0.2s ease-out;
    }

    .floor-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: oklch(38% 0.01 250);
      flex-shrink: 0;
      transition: background 0.2s ease-out, transform 0.2s ease-out;
    }

    .floor-item:hover .floor-number { color: var(--muted); }
    .floor-item:hover .floor-dot    { background: oklch(48% 0.01 250 / 0.6); }

    .floor-item.has-available .floor-dot { background: oklch(70% 0.175 52 / 0.3); }

    .floor-item.hover-highlight .floor-number { color: oklch(82% 0.005 250); }
    .floor-item.hover-highlight .floor-dot    { background: oklch(60% 0.01 250 / 0.55); transform: scale(1.3); }

    .floor-item.active .floor-number { color: var(--accent); }
    .floor-item.active .floor-dot    { background: var(--accent); transform: scale(1.8); }

    /* ── BACK BUTTON ─────────────────────────────────────────────────────── */
    #back-btn {
      position: fixed;
      top: 84px;
      left: 32px;
      z-index: 20;
      display: none;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #back-btn.visible { display: flex; }
    #back-btn:hover   { color: var(--text); border-color: var(--muted); }
    #back-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .back-arrow {
      font-size: 0.6rem;
      line-height: 1;
      display: inline-block;
      transform: translateY(-0.5px);
    }

    /* ── UNIT HOVER LABEL ────────────────────────────────────────────────── */
    #unit-label {
      position: fixed;
      z-index: 30;
      pointer-events: none;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      border-radius: 7px;
      padding: 7px 11px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transform: translate(14px, -50%);
      transition: opacity 0.12s ease-out;
    }
    #unit-label.visible { opacity: 1; }

    .unit-label-id {
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .unit-label-status {
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.10em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .unit-label-status.disponible { color: var(--accent); }

    /* ── UNIT PANEL ──────────────────────────────────────────────────────── */
    #unit-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      height: 100%;
      z-index: 40;
      background: oklch(11% 0.012 250 / 0.65);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border-left: 1px solid oklch(32% 0.014 250 / 0.45);
      transform: translateX(100%);
      transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #unit-panel.open { transform: translateX(0); }

    .panel-header {
      padding: 80px 32px 28px;
      border-bottom: 1px solid oklch(28% 0.012 250 / 0.5); /* header: slightly stronger */
      position: relative;
      flex-shrink: 0;
    }

    #panel-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.875rem;
      line-height: 1;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      padding: 0;
    }
    #panel-close:hover { color: var(--text); border-color: var(--muted); }
    #panel-close:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .panel-floor-label {
      display: block;
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--label);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .panel-unit-name {
      font-family: var(--font-display);
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
      text-transform: uppercase;
      line-height: 1;
    }

    .panel-body {
      padding: 28px 32px 32px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .panel-stats { display: flex; flex-direction: column; }

    .panel-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid var(--panel-border);
    }
    .panel-stat:first-child { border-top: 1px solid var(--panel-border); }

    .stat-label {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--label);
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .stat-value.accent { color: var(--accent); }

    .panel-note {
      font-size: 0.6875rem;
      color: oklch(55% 0.009 250);
      line-height: 1.65;
      letter-spacing: 0.02em;
    }

    .panel-cta {
      display: block;
      text-align: center;
      padding: 13px 24px;
      background: var(--accent);
      color: var(--bg);
      font-family: var(--font-body);
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .panel-cta:hover { opacity: 0.85; }
    .panel-cta:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── PANEL STATES ────────────────────────────────────────────────────── */
    .panel-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 24px;
    }
    .panel-section[hidden] { display: none; }

    #panel-detail { justify-content: space-between; }

    /* ── CONTACT FORM ────────────────────────────────────────────────────── */
    .panel-back {
      align-self: flex-start;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }
    .panel-back:hover { color: var(--text); }
    .panel-back:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 2px;
    }

    #contact-form {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 24px;
    }

    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .form-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--label);
      text-transform: uppercase;
    }

    .form-input {
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 400;
      padding: 9px 0;
      transition: border-color 0.2s;
      -webkit-font-smoothing: antialiased;
    }
    .form-input:focus {
      outline: none;
      border-bottom-color: var(--accent);
      box-shadow: 0 2px 0 -1px oklch(70% 0.175 52 / 0.25);
    }
    .form-input::placeholder { color: var(--dim); }
    .form-input.error { border-bottom-color: oklch(60% 0.20 25); }

    .form-error {
      font-size: 0.5625rem;
      color: oklch(60% 0.20 25);
      letter-spacing: 0.06em;
      display: none;
    }
    .form-error.visible { display: block; }

    /* ── SUCCESS STATE ───────────────────────────────────────────────────── */
    #panel-success {
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
    }

    .success-ring {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .success-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      text-transform: uppercase;
    }

    .success-body {
      font-size: 0.6875rem;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ── NAV ─────────────────────────────────────────────────────────────── */
    #nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 55;
      display: flex;
      align-items: center;
      gap: 36px;
      padding: 11px 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      white-space: nowrap;
      transition: background 0.4s;
    }

    .nav-brand {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: oklch(93% 0.005 250 / 0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-brand:hover { color: oklch(93% 0.005 250 / 0.9); }

    .nav-links { display: flex; gap: 28px; list-style: none; }

    .nav-links a {
      font-size: 0.75rem;
      font-weight: 500;
      color: oklch(93% 0.005 250);
      opacity: 0.40;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: opacity 0.2s;
    }
    .nav-links a:hover  { opacity: 0.80; }
    .nav-links a.active { opacity: 1; }

    .nav-cta {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 7px 18px;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-cta:hover { opacity: 0.85; }

    #nav-wrapper        { display: contents; }
    #nav-mobile-dropdown { display: none; }

    /* ── REDUCED MOTION ─────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration:  0.01ms !important;
      }
      #canvas-container { transition: none; }
      #loading-overlay  { transition: none; }
      #unit-panel       { transition: none; }
      #unit-label       { transition: none; }
    }

    /* ── MOBILE ≤ 767px ─────────────────────────────────────────────────── */
    @media (max-width: 767px) {
      #nav-wrapper {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        min-width: 180px;
        z-index: 55;
      }

      .nav-links { display: none; }

      #nav {
        position: relative;
        top: auto; left: auto;
        transform: none;
        z-index: 2;
        width: 100%;
        justify-content: center;
        gap: 16px;
        padding: 9px 16px;
        min-height: 62px;
        border-radius: 100px;
      }

      .nav-cta { display: none; }

      .nav-brand::after {
        content: '▾';
        margin-left: 5px;
        font-size: 0.5rem;
        opacity: 0.40;
        display: inline-block;
        transition: transform 0.2s ease;
        vertical-align: middle;
      }
      .nav-brand[aria-expanded="true"]::after {
        transform: rotate(180deg);
        opacity: 0.70;
      }

      #nav-mobile-dropdown {
        display: block;
        position: relative;
        z-index: 1;
        width: 100%;
        margin-top: -31px;
        padding-top: 31px;
        background: oklch(17% 0.01 250 / 0.78);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid var(--glass-border);
        border-top: none;
        border-radius: 0 0 28px 28px;
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        pointer-events: none;
        transition: max-height 0.30s ease-out, opacity 0.22s ease;
      }

      #nav-mobile-dropdown.open {
        max-height: 280px;
        opacity: 1;
        pointer-events: auto;
      }

      .nav-mobile-links {
        display: flex;
        flex-direction: column;
        padding: 10px 0 6px;
      }

      .nav-mobile-links a {
        display: block;
        padding: 9px 0;
        font-size: 0.6875rem;
        font-weight: 500;
        color: oklch(93% 0.005 250);
        opacity: 0.45;
        text-decoration: none;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        text-align: center;
        transition: opacity 0.2s;
      }

      .nav-mobile-links a:hover  { opacity: 0.85; }
      .nav-mobile-links a.active { opacity: 1; }

      #nav-mobile-dropdown .nav-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 6px 16px 14px;
        padding: 10px 0;
        min-height: 44px;
        width: calc(100% - 32px);
        font-size: 0.6875rem;
      }

      #floor-list {
        left: 14px;
        gap: 4px;
      }

      #back-btn {
        top: 84px;
        left: 14px;
        font-size: 0.5rem;
        padding: 6px 11px;
      }

      #unit-panel {
        width: 100%;
        height: 68%;
        top: auto;
        bottom: 0;
        right: 0;
        transform: translateY(100%);
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 20px 20px 0 0;
      }
      #unit-panel.open { transform: translateY(0); }

      .panel-header { padding: 28px 24px 20px; }
      #panel-close  { top: 20px; right: 18px; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ────────────────────────────────────────────────────────────── -->
  <div id="nav-wrapper">
    <nav id="nav" aria-label="Navegación principal">
      <a href="index.html" class="nav-brand" aria-expanded="false" aria-controls="nav-mobile-dropdown">FORMA</a>
      <ul class="nav-links">
        <li><a href="emotion.html">Emotion</a></li>
        <li><a href="ownership.html" class="active">Ownership</a></li>
        <li><a href="action.html">Action</a></li>
        <li><a href="location.html">Location</a></li>
      </ul>
      <a href="#" class="nav-cta">Contact</a>
    </nav>

    <div id="nav-mobile-dropdown" role="menu" aria-label="Menú de navegación">
      <nav class="nav-mobile-links" aria-label="Secciones del sitio">
        <a href="emotion.html" role="menuitem">Emotion</a>
        <a href="ownership.html" role="menuitem" class="active">Ownership</a>
        <a href="action.html" role="menuitem">Action</a>
        <a href="location.html" role="menuitem">Location</a>
      </nav>
      <a href="#" class="nav-cta" role="menuitem">Contact</a>
    </div>
  </div>

  <!-- ── LOADING ─────────────────────────────────────────────────────────── -->
  <div id="loading-overlay">
    <span class="loading-title">Ownership</span>
    <div class="loading-bar-track">
      <div id="loading-bar"></div>
    </div>
    <span class="loading-label">Cargando torre</span>
  </div>

  <!-- ── CANVAS ──────────────────────────────────────────────────────────── -->
  <div id="canvas-container">
    <canvas id="three-canvas" role="img" aria-label="Visualizador 3D interactivo de la torre FORMA — selecciona un nivel para explorar las unidades disponibles"></canvas>
  </div>

  <!-- ── CANVAS DIM ──────────────────────────────────────────────────────── -->
  <div id="canvas-dim"></div>

  <!-- ── FLOOR LIST ──────────────────────────────────────────────────────── -->
  <div id="floor-list" role="navigation" aria-label="Navegación por pisos"></div>

  <!-- ── BACK BUTTON ─────────────────────────────────────────────────────── -->
  <button id="back-btn" aria-label="Volver a vista orbital">
    <span class="back-arrow">&#8592;</span> Torre
  </button>

  <!-- ── UNIT HOVER LABEL ────────────────────────────────────────────────── -->
  <div id="unit-label" role="tooltip">
    <span class="unit-label-id"  id="label-id"></span>
    <span class="unit-label-status" id="label-status"></span>
  </div>

  <!-- ── UNIT PANEL ──────────────────────────────────────────────────────── -->
  <div id="unit-panel" role="complementary" aria-label="Detalle de unidad">
    <div class="panel-header">
      <button id="panel-close" aria-label="Cerrar panel">&#215;</button>
      <span class="panel-floor-label" id="panel-floor-label"></span>
      <h2  class="panel-unit-name"   id="panel-unit-name"></h2>
    </div>
    <div class="panel-body">

      <!-- Estado: detalle de unidad -->
      <div id="panel-detail" class="panel-section">
        <div class="panel-stats" id="panel-stats"></div>
        <button class="panel-cta" id="panel-cta-contact">Hablar con un asesor</button>
      </div>

      <!-- Estado: formulario de contacto -->
      <div id="panel-form" class="panel-section" hidden>
        <button class="panel-back" id="panel-back">&#8592; Volver</button>
        <form id="contact-form" novalidate>
          <div class="form-fields">
            <div class="form-field">
              <label class="form-label" for="f-nombre">Nombre</label>
              <input class="form-input" id="f-nombre" name="nombre"
                     type="text" required autocomplete="name"
                     placeholder="Tu nombre completo"
                     aria-describedby="f-nombre-error">
              <span class="form-error" id="f-nombre-error" role="alert">Campo requerido</span>
            </div>
            <div class="form-field">
              <label class="form-label" for="f-email">Email</label>
              <input class="form-input" id="f-email" name="email"
                     type="email" required autocomplete="email"
                     placeholder="tu@email.com"
                     aria-describedby="f-email-error">
              <span class="form-error" id="f-email-error" role="alert">Email válido requerido</span>
            </div>
            <div class="form-field">
              <label class="form-label" for="f-tel">Teléfono</label>
              <input class="form-input" id="f-tel" name="tel"
                     type="tel" autocomplete="tel"
                     placeholder="+52 000 000 0000">
            </div>
          </div>
          <button type="submit" class="panel-cta">Enviar solicitud</button>
        </form>
      </div>

      <!-- Estado: confirmación de envío -->
      <div id="panel-success" class="panel-section" hidden>
        <div class="success-ring">&#10003;</div>
        <span class="success-title">Enviado</span>
        <p class="success-body">
          Tu solicitud fue enviada.<br>
          Un asesor te contactará en breve.
        </p>
      </div>

    </div>
  </div>

  <!-- ── THREE.JS ────────────────────────────────────────────────────────── -->
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader }     from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
    import { SSAOPass }       from 'three/addons/postprocessing/SSAOPass.js';
    import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

    // ── MOTION PREFERENCE ────────────────────────────────────────────────────
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // ── STATE ────────────────────────────────────────────────────────────────
    let mode            = 'orbital';
    let selectedFloor   = null;
    let selectedUnit    = null;
    let hoveredFloorIdx = null;
    let floorViewPos    = null;   // posición guardada al entrar a unit
    let floorViewTgt    = null;
    let hoveredUnit     = null;
    let isTransitioning = false;
    let panelOpen       = false;
    let glbModel        = null;   // referencia al modelo completo para hide-all
    let panelState      = 'detail'; // 'detail' | 'form' | 'success'
    let currentUnitData = null;
    let disponibilidad  = {};
    let floorGroups     = [];      // [{label, nodeName, items, y_center, units, meshToUnit}]
    let meshToFloor     = new Map(); // mesh → floorIndex (para selección desde unidades en orbital)
    let modelCenter     = new THREE.Vector3();
    let modelMaxDim     = 1;
    let azoteaItems     = [];
    const ghostMeshes   = [];

    // ── RENDERER ─────────────────────────────────────────────────────────────
    const canvas    = document.getElementById('three-canvas');
    const container = document.getElementById('canvas-container');
    const W = () => window.innerWidth;
    const H = () => window.innerHeight;

    // LinearSRGBColorSpace aquí — OutputPass aplica la conversión sRGB final
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
    renderer.setSize(W(), H());
    renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

    // ── SCENE ────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color().setRGB(0.102, 0.102, 0.133, THREE.LinearSRGBColorSpace);

    // ── CAMERA ───────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(15, W() / H(), 0.1, 2000);

    // ── CONTROLS ─────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.07;
    controls.enablePan      = false;
    controls.maxPolarAngle  = Math.PI * 0.85;
    controls.update();

    // Cámara sólo ve layer 0 (geometría real).
    // Ghost volumes van en layer 1 → SSAOPass no los incluye → sin sombras fantasma.
    camera.layers.set(0);

    // ── LIGHTS ───────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 2.2));
    const sun = new THREE.DirectionalLight(0xfff8f0, 2.8);
    sun.position.set(60, 100, 50);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xe8f0ff, 1.2);
    fill.position.set(-50, 30, -70);
    scene.add(fill);
    const back = new THREE.DirectionalLight(0xffffff, 0.6);
    back.position.set(0, -20, -60);
    scene.add(back);

    // ── POST-PROCESSING ──────────────────────────────────────────────────────
    const composer   = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);
    const ssaoPass = new SSAOPass(scene, camera, W(), H());
    ssaoPass.kernelRadius = 12;
    ssaoPass.minDistance  = 0.002;
    ssaoPass.maxDistance  = 0.18;
    ssaoPass.output = SSAOPass.OUTPUT.Default;
    composer.addPass(ssaoPass);
    composer.addPass(new OutputPass());


    // ── MATERIALS ────────────────────────────────────────────────────────────
    const MAT_BASE = new THREE.MeshLambertMaterial({ color: 0xd8d5cf, side: THREE.DoubleSide });
    const MAT_HOVER = new THREE.MeshLambertMaterial({ color: 0xfaf6ee, side: THREE.DoubleSide });
    const MAT_UNIT_HOVER = new THREE.MeshLambertMaterial({ color: 0xd0ba8f, side: THREE.DoubleSide });
    const MAT_UNIT_SEL   = new THREE.MeshLambertMaterial({ color: 0xc8a050, side: THREE.DoubleSide });
    const MAT_EDGE = new THREE.LineBasicMaterial({ color: 0x1a1820, transparent: true, opacity: 0.22, depthWrite: false });

    // ── RAYCASTERS ───────────────────────────────────────────────────────────
    const raycaster     = new THREE.Raycaster();
    raycaster.layers.set(1);        // layer 1: ghost volumes (floor picking)
    const unitRaycaster = new THREE.Raycaster();
    unitRaycaster.layers.set(0);    // layer 0: geometría real (unit picking)
    const mouse = new THREE.Vector2(-999, -999);

    // ── AVAILABILITY ─────────────────────────────────────────────────────────
    async function loadDisponibilidad() {
      try {
        const res  = await fetch('content/data/disponibilidad.json');
        const data = await res.json();
        data.unidades.forEach(u => {
          disponibilidad[u.id] = { estado: u.estado, tipo: u.tipo, m2: u.m2 };
        });
      } catch {
        // JSON no encontrado — las unidades se mostrarán igual, sin datos de disponibilidad
      }
    }

    function unitDispo(unit) {
      return disponibilidad[unit.id] ?? null;
    }

    function hasAvailableUnits(fg) {
      return (fg.units || []).some(u => unitDispo(u)?.estado === 'disponible');
    }

    // ── UI REFS ───────────────────────────────────────────────────────────────
    const unitLabelEl = document.getElementById('unit-label');
    const labelId     = document.getElementById('label-id');
    const labelStatus = document.getElementById('label-status');

    // ── EASING / TWEEN ───────────────────────────────────────────────────────
    function easeInOutCubic(t) {
      return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    }
    function tweenCamera(fp, ft, tp, tt, dur, onDone) {
      const start = performance.now();
      const a = fp.clone(), b = ft.clone();
      (function tick(now) {
        const t = Math.min((now - start) / dur, 1);
        const e = easeInOutCubic(t);
        camera.position.lerpVectors(a, tp, e);
        controls.target.lerpVectors(b, tt, e);
        controls.update();
        if (t < 1) requestAnimationFrame(tick);
        else if (onDone) onDone();
      })(performance.now());
    }

    // ── HIGHLIGHT HELPERS ────────────────────────────────────────────────────
    function highlightFloorItem(fi) {
      document.querySelectorAll('.floor-item').forEach(el =>
        el.classList.toggle('hover-highlight', parseInt(el.dataset.fi) === fi)
      );
    }
    function clearFloorHighlight() {
      document.querySelectorAll('.floor-item.hover-highlight').forEach(el =>
        el.classList.remove('hover-highlight')
      );
    }
    function highlightFloor3D(fi) {
      if (fi === null || !floorGroups[fi]) return;
      const fg = floorGroups[fi];
      fg.items.forEach(mesh => { mesh.material = MAT_UNIT_HOVER; });
      (fg.units || []).forEach(u => u.items.forEach(m => { m.material = MAT_UNIT_HOVER; }));
    }
    function clearFloor3DHover(fi) {
      if (fi === null || !floorGroups[fi]) return;
      const fg = floorGroups[fi];
      fg.items.forEach(mesh => { mesh.material = MAT_BASE; });
      (fg.units || []).forEach(u => u.items.forEach(m => { m.material = MAT_BASE; }));
    }

    // ── FLOOR VISIBILITY ──────────────────────────────────────────────────────
    function applyFloorVisibility(activeIdx) {
      // Ocultar TODO el modelo primero — elimina cualquier geometría
      // no capturada en floorGroups (muros, columnas, etc.)
      if (glbModel) glbModel.traverse(obj => { if (obj.isMesh) obj.visible = false; });

      // Mostrar solo los pisos ≤ activeIdx
      floorGroups.forEach((fg, i) => {
        if (i > activeIdx) return;
        fg.items.forEach(mesh => {
          mesh.visible  = true;
          mesh.material = MAT_BASE;
          mesh.children.forEach(c => { if (c.isLineSegments) c.visible = true; });
        });
        (fg.units || []).forEach(u =>
          u.items.forEach(m => { m.visible = true; })
        );
      });
    }

    function resetVisibility() {
      // Restaurar todo el modelo como visible
      if (glbModel) glbModel.traverse(obj => { if (obj.isMesh) obj.visible = true; });

      // Asignar materiales correctos a los floors conocidos
      azoteaItems.forEach(mesh => { mesh.material = MAT_BASE; });
      floorGroups.forEach(fg => {
        fg.items.forEach(mesh => {
          mesh.material = MAT_BASE;
          mesh.children.forEach(c => { if (c.isLineSegments) c.visible = true; });
        });
        (fg.units || []).forEach(u =>
          u.items.forEach(m => { m.material = MAT_BASE; })
        );
      });
    }

    // ── SELECT FLOOR ─────────────────────────────────────────────────────────
    function selectFloor(fi) {
      if (isTransitioning) return;
      if (panelOpen) closePanel();

      // Limpiar hover antes de transicionar
      if (hoveredFloorIdx !== null) {
        setGhostHover(hoveredFloorIdx, false);
        clearFloor3DHover(hoveredFloorIdx);
        clearFloorHighlight();
        hoveredFloorIdx = null;
      }

      selectedFloor = fi;
      selectedUnit  = null;
      hoveredUnit   = null;
      unitLabelEl.classList.remove('visible');

      const fg = floorGroups[fi];
      applyFloorVisibility(fi);
      syncFloorList();

      const fromPos  = camera.position.clone();
      const fromTgt  = controls.target.clone();
      const offset   = modelMaxDim * 0.5;
      const fc       = fg.center ?? new THREE.Vector3(modelCenter.x, fg.y_center, modelCenter.z);
      const toTarget = fc.clone();
      const toPos    = new THREE.Vector3(
        fc.x + offset,
        fc.y + offset * 5.0,
        fc.z + offset
      );

      isTransitioning  = true;
      controls.enabled = false;
      ghostMeshes.forEach(g => { if (g) { g.visible = false; g.material.opacity = 0; } });

      tweenCamera(fromPos, fromTgt, toPos, toTarget, reducedMotion ? 1 : 1100, () => {
        isTransitioning  = false;
        mode             = 'floor';
        controls.enabled = true;
        document.getElementById('back-btn').classList.add('visible');
      });
    }

    function returnToOrbital() {
      if (isTransitioning) return;
      if (panelOpen) closePanel();
      resetVisibility();
      selectedUnit  = null;
      hoveredUnit   = null;
      unitLabelEl.classList.remove('visible');

      const fromPos  = camera.position.clone();
      const fromTgt  = controls.target.clone();
      const fov  = camera.fov * (Math.PI / 180);
      const dist = (modelMaxDim / 2) / Math.tan(fov / 2) * 1.5;
      const toPos    = new THREE.Vector3(
        modelCenter.x + dist * 0.55,
        modelCenter.y + dist * 0.38,
        modelCenter.z + dist * 0.55
      );
      const toTarget = modelCenter.clone();

      isTransitioning = true;
      tweenCamera(fromPos, fromTgt, toPos, toTarget, reducedMotion ? 1 : 950, () => {
        isTransitioning = false;
        mode            = 'orbital';
        selectedFloor   = null;
        ghostMeshes.forEach(g => { if (g) g.visible = true; });
        syncFloorList();
        document.getElementById('back-btn').classList.remove('visible');
      });
    }

    function returnToFloor() {
      if (isTransitioning || selectedFloor === null) return;
      if (panelOpen) closePanel();
      selectedUnit = null; hoveredUnit = null;
      unitLabelEl.classList.remove('visible');

      const fg = floorGroups[selectedFloor];
      fg.units.forEach(u =>
        u.items.forEach(m => { m.material = MAT_BASE; })
      );


      // Restaurar la posición exacta de la vista por nivel anterior
      const toPos    = floorViewPos ?? new THREE.Vector3(modelCenter.x + modelMaxDim * 0.35, fg.y_center + modelMaxDim * 1.75, modelCenter.z + modelMaxDim * 0.35);
      const toTarget = floorViewTgt ?? new THREE.Vector3(modelCenter.x, fg.y_center, modelCenter.z);

      // Tween inline — interpola posición, target Y fov simultáneamente
      isTransitioning = true; controls.enabled = false;
      const _fp = camera.position.clone(), _ft = controls.target.clone();
      const _fovStart = camera.fov, _fovEnd = 15;
      const _dur = reducedMotion ? 1 : 800, _t0 = performance.now();
      (function tick(now) {
        const t = Math.min((now - _t0) / _dur, 1);
        const e = easeInOutCubic(t);
        camera.position.lerpVectors(_fp, toPos, e);
        controls.target.lerpVectors(_ft, toTarget, e);
        camera.fov = _fovStart + (_fovEnd - _fovStart) * e;
        camera.updateProjectionMatrix();
        controls.update();
        if (t < 1) requestAnimationFrame(tick);
        else { isTransitioning = false; mode = 'floor'; controls.enabled = true; floorViewPos = null; floorViewTgt = null; }
      })(performance.now());
    }

    function syncFloorList() {
      document.querySelectorAll('.floor-item').forEach(el =>
        el.classList.toggle('active', parseInt(el.dataset.fi) === selectedFloor)
      );
    }

    // ── FLOOR LIST UI ────────────────────────────────────────────────────────
    function buildFloorList() {
      const el = document.getElementById('floor-list');
      el.innerHTML = '';
      for (let i = floorGroups.length - 1; i >= 0; i--) {
        const fg   = floorGroups[i];
        const avail = hasAvailableUnits(fg);
        const item = document.createElement('div');
        item.className  = 'floor-item' + (avail ? ' has-available' : '');
        item.dataset.fi = i;
        item.setAttribute('role', 'button');
        item.setAttribute('tabindex', '0');
        item.setAttribute('aria-label', fg.label);
        item.innerHTML = `
          <span class="floor-number">${fg.label}</span>
          <span class="floor-dot"></span>
        `;
        item.addEventListener('click', () => {
          if (isTransitioning) return;
          if (mode === 'floor' && selectedFloor === i) return;
          selectFloor(i);
        });
        item.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectFloor(i); }
        });
        item.addEventListener('mouseenter', () => {
          if (mode !== 'orbital' || isTransitioning) return;
          if (hoveredFloorIdx !== null) { setGhostHover(hoveredFloorIdx, false); clearFloor3DHover(hoveredFloorIdx); }
          hoveredFloorIdx = i;
          setGhostHover(i, true);
          highlightFloor3D(i);
          highlightFloorItem(i);
        });
        item.addEventListener('mouseleave', () => {
          if (mode !== 'orbital' || isTransitioning) return;
          setGhostHover(hoveredFloorIdx, false);
          clearFloor3DHover(hoveredFloorIdx);
          clearFloorHighlight();
          hoveredFloorIdx = null;
        });
        el.appendChild(item);
      }
      el.classList.add('visible');
    }

    // ── GHOST VOLUMES ────────────────────────────────────────────────────────
    const ghostMat = new THREE.MeshLambertMaterial({
      color: 0xc8a050, transparent: true, opacity: 0,
      depthWrite: false, side: THREE.FrontSide,
    });

    function buildGhostVolumes() {
      floorGroups.forEach((fg, fi) => {
        const box = new THREE.Box3();
        // Incluir meshes estructurales del piso
        fg.items.forEach(mesh => {
          mesh.geometry.computeBoundingBox();
          const wb = mesh.geometry.boundingBox.clone().applyMatrix4(mesh.matrixWorld);
          box.union(wb);
        });
        // Incluir meshes de unidades (pueden estar fuera del bbox estructural)
        (fg.units || []).forEach(u => u.items.forEach(mesh => {
          mesh.geometry.computeBoundingBox();
          const wb = mesh.geometry.boundingBox.clone().applyMatrix4(mesh.matrixWorld);
          box.union(wb);
        }));
        if (box.isEmpty()) { ghostMeshes.push(null); return; }
        fg.center   = box.getCenter(new THREE.Vector3()); // centro real XYZ del piso
        fg.y_center = fg.center.y;
        const size   = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const geo    = new THREE.BoxGeometry(size.x, size.y, size.z);
        const mat    = ghostMat.clone();
        const ghost  = new THREE.Mesh(geo, mat);
        ghost.position.copy(center);
        ghost.userData.floorIndex = fi;
        ghost.layers.set(1);
        scene.add(ghost);
        ghostMeshes.push(ghost);
      });
    }

    function setGhostHover(fi, on) {
      if (fi === null || !ghostMeshes[fi]) return;
      ghostMeshes[fi].material.opacity = on ? 0.10 : 0;
    }

    // ── SELECT UNIT ──────────────────────────────────────────────────────────
    function selectUnit(unit) {
      if (isTransitioning || selectedFloor === null || !unit) return;
      selectedUnit = unit;

      const fg = floorGroups[selectedFloor];
      fg.units.forEach(u =>
        u.items.forEach(m => {
          m.material = (u === unit) ? MAT_UNIT_SEL : MAT_BASE;
        })
      );

      const box = new THREE.Box3();
      unit.items.forEach(m => box.expandByObject(m));
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const dim    = Math.max(size.x, size.y, size.z, modelMaxDim * 0.08);

      // Guardar posición actual (vista por nivel) para poder restaurarla al salir
      floorViewPos = camera.position.clone();
      floorViewTgt = controls.target.clone();

      const off = dim * 2.8;
      const toPos = new THREE.Vector3(
        center.x + off * 1.0,
        center.y + off * 4.0,
        center.z + off * 1.0
      );

      // Tween inline — interpola posición, target Y fov simultáneamente
      isTransitioning = true; controls.enabled = false;
      const _fp = camera.position.clone(), _ft = controls.target.clone();
      const _fovStart = camera.fov, _fovEnd = 8;
      const _dur = reducedMotion ? 1 : 900, _t0 = performance.now();
      (function tick(now) {
        const t = Math.min((now - _t0) / _dur, 1);
        const e = easeInOutCubic(t);
        camera.position.lerpVectors(_fp, toPos, e);
        controls.target.lerpVectors(_ft, center, e);
        camera.fov = _fovStart + (_fovEnd - _fovStart) * e;
        camera.updateProjectionMatrix();
        controls.update();
        if (t < 1) requestAnimationFrame(tick);
        else { isTransitioning = false; mode = 'unit'; controls.enabled = true; openPanel(unit); }
      })(performance.now());
    }

    // ── UNIT PANEL ────────────────────────────────────────────────────────────
    const unitPanel  = document.getElementById('unit-panel');
    const canvasDim  = document.getElementById('canvas-dim');
    const panelClose = document.getElementById('panel-close');

    function setPanelState(state) {
      document.querySelectorAll('.panel-section').forEach(el => { el.hidden = true; });
      document.getElementById(`panel-${state}`).hidden = false;
      panelState = state;
    }

    function openPanel(unit) {
      const fg = floorGroups[selectedFloor];
      const d  = unitDispo(unit);
      const floorLabel = fg ? fg.label : '—';
      const unitLabel  = unit.label;

      currentUnitData = { floorLabel, unitLabel, tipo: d?.tipo ?? '—', m2: d?.m2 ?? '—' };

      document.getElementById('panel-floor-label').textContent = floorLabel;
      document.getElementById('panel-unit-name').textContent   = unitLabel;
      document.getElementById('panel-stats').innerHTML = `
        <div class="panel-stat">
          <span class="stat-label">Tipología</span>
          <span class="stat-value">${d?.tipo ?? '—'}</span>
        </div>
        <div class="panel-stat">
          <span class="stat-label">Superficie</span>
          <span class="stat-value">${d?.m2 ? d.m2 + ' m²' : '—'}</span>
        </div>
        <div class="panel-stat">
          <span class="stat-label">Estado</span>
          <span class="stat-value accent">Disponible</span>
        </div>
      `;

      setPanelState('detail');
      unitPanel.classList.add('open');
      canvasDim.classList.add('active');
      unitLabelEl.classList.remove('visible');
      panelOpen = true;
    }

    function closePanel() {
      unitPanel.classList.remove('open');
      canvasDim.classList.remove('active');
      panelOpen = false;
      // Reset form and state after close animation (0.42s)
      setTimeout(() => {
        document.getElementById('contact-form').reset();
        setPanelState('detail');
      }, 460);
    }

    panelClose.addEventListener('click', closePanel);
    canvasDim.addEventListener('click', closePanel);

    // Escape: cierra el panel si abierto, o navega hacia atrás en la vista
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      if (panelOpen) { closePanel(); return; }
      if (mode === 'unit')  returnToFloor();
      else if (mode === 'floor') returnToOrbital();
    });

    // Limpiar errores al corregir
    ['f-nombre', 'f-email'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('error');
        document.getElementById(id + '-error').classList.remove('visible');
      });
    });

    // CTA: detalle → formulario
    document.getElementById('panel-cta-contact').addEventListener('click', () => {
      setPanelState('form');
    });

    // Volver: formulario → detalle
    document.getElementById('panel-back').addEventListener('click', () => {
      setPanelState('detail');
    });

    // Submit del formulario
    document.getElementById('contact-form').addEventListener('submit', e => {
      e.preventDefault();
      const nombreEl = document.getElementById('f-nombre');
      const emailEl  = document.getElementById('f-email');
      const nombre   = nombreEl.value.trim();
      const email    = emailEl.value.trim();
      const telefono = document.getElementById('f-tel').value.trim();

      // Inline validation
      let valid = true;
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      nombreEl.classList.toggle('error', !nombre);
      document.getElementById('f-nombre-error').classList.toggle('visible', !nombre);
      if (!nombre) { valid = false; nombreEl.focus(); }

      emailEl.classList.toggle('error', !email || !emailRe.test(email));
      document.getElementById('f-email-error').classList.toggle('visible', !email || !emailRe.test(email));
      if (!email || !emailRe.test(email)) {
        valid = false;
        if (nombre) emailEl.focus();
      }

      if (!valid) return;

      const subject = encodeURIComponent(
        `Solicitud FORMA — ${currentUnitData.floorLabel}, ${currentUnitData.unitLabel}`
      );
      const body = encodeURIComponent(
        `Nombre: ${nombre}\n` +
        `Email: ${email}\n` +
        `Teléfono: ${telefono || '—'}\n\n` +
        `Unidad de interés:\n` +
        `${currentUnitData.floorLabel} / ${currentUnitData.unitLabel}\n` +
        `Tipología: ${currentUnitData.tipo}\n` +
        `Superficie: ${currentUnitData.m2} m²`
      );
      window.location.href = `mailto:asesor@forma.com?subject=${subject}&body=${body}`;

      setPanelState('success');
      setTimeout(() => closePanel(), 3000);
    });

    // ── MOUSE EVENTS ─────────────────────────────────────────────────────────
    canvas.addEventListener('mousemove', e => {
      mouse.x =  (e.clientX / W()) * 2 - 1;
      mouse.y = -(e.clientY / H()) * 2 + 1;

      // Update hover-label position (cursor-following)
      unitLabelEl.style.left = (e.clientX + 16) + 'px';
      unitLabelEl.style.top  = (e.clientY - 8)  + 'px';

      if (isTransitioning) return;

      // ── Orbital: hover de pisos via ghost volumes + meshes de unidades ──
      if (mode === 'orbital' && ghostMeshes.length) {
        raycaster.setFromCamera(mouse, camera);
        const ghostHit = raycaster.intersectObjects(ghostMeshes.filter(Boolean), false)[0];
        let fi = ghostHit ? ghostHit.object.userData.floorIndex : null;

        // Si no hay ghost hit, intentar con meshes de unidades
        if (fi === null && meshToFloor.size) {
          unitRaycaster.setFromCamera(mouse, camera);
          const allUnitMeshes = floorGroups.flatMap(fg => fg.units?.flatMap(u => u.items) ?? []);
          const unitHit = unitRaycaster.intersectObjects(allUnitMeshes, false)[0];
          if (unitHit) fi = meshToFloor.get(unitHit.object) ?? null;
        }

        if (fi !== hoveredFloorIdx) {
          if (hoveredFloorIdx !== null) { setGhostHover(hoveredFloorIdx, false); clearFloor3DHover(hoveredFloorIdx); clearFloorHighlight(); }
          hoveredFloorIdx = fi;
          if (fi !== null) { setGhostHover(fi, true); highlightFloor3D(fi); highlightFloorItem(fi); canvas.style.cursor = 'pointer'; }
          else canvas.style.cursor = 'grab';
        }
        unitLabelEl.classList.remove('visible');
      }

      // ── Floor / Unit: hover de unidades ──
      if ((mode === 'floor' || mode === 'unit') && selectedFloor !== null && !panelOpen) {
        const fg = floorGroups[selectedFloor];
        if (!fg.units?.length) return;

        unitRaycaster.setFromCamera(mouse, camera);
        const allUnitMeshes = fg.units.flatMap(u => u.items);
        const hit     = unitRaycaster.intersectObjects(allUnitMeshes, false)[0];
        const newUnit = hit ? fg.meshToUnit.get(hit.object) ?? null : null;

        if (newUnit !== hoveredUnit) {
          if (hoveredUnit && hoveredUnit !== selectedUnit)
            hoveredUnit.items.forEach(m => { m.material = MAT_BASE; });
          hoveredUnit = newUnit;
          if (newUnit && newUnit !== selectedUnit)
            newUnit.items.forEach(m => { m.material = MAT_UNIT_HOVER; });
          canvas.style.cursor = newUnit ? 'pointer' : 'grab';
        }

        if (hoveredUnit && mode !== 'unit') {
          const d = unitDispo(hoveredUnit);
          labelId.textContent     = `${floorGroups[selectedFloor].label} / ${hoveredUnit.label}`;
          labelStatus.textContent = d?.estado === 'disponible' ? 'Disponible' : (d ? 'Vendida' : 'Disponible');
          labelStatus.className   = 'unit-label-status disponible';
          unitLabelEl.classList.add('visible');
        } else {
          unitLabelEl.classList.remove('visible');
        }
      }
    });

    canvas.addEventListener('mouseleave', () => {
      if (hoveredFloorIdx !== null) {
        setGhostHover(hoveredFloorIdx, false);
        clearFloor3DHover(hoveredFloorIdx);
        clearFloorHighlight();
        hoveredFloorIdx = null;
      }
      if (hoveredUnit && hoveredUnit !== selectedUnit)
        hoveredUnit.items.forEach(m => { m.material = MAT_BASE; });
      hoveredUnit = null;
      unitLabelEl.classList.remove('visible');
      canvas.style.cursor = 'grab';
    });

    // Distinguir click real de fin-de-drag
    let mouseDownPos = { x: 0, y: 0 };
    let wasDragging  = false;
    const DRAG_THRESHOLD = 5;
    canvas.addEventListener('mousedown', e => { mouseDownPos = {x: e.clientX, y: e.clientY}; wasDragging = false; });
    canvas.addEventListener('mousemove', e => {
      if (e.buttons === 1) {
        const dx = e.clientX - mouseDownPos.x;
        const dy = e.clientY - mouseDownPos.y;
        if (Math.hypot(dx, dy) > DRAG_THRESHOLD) wasDragging = true;
      }
    });
    canvas.addEventListener('click', () => {
      if (wasDragging || isTransitioning || panelOpen) return;
      if (mode === 'orbital' && hoveredFloorIdx !== null) {
        selectFloor(hoveredFloorIdx);
      } else if (mode === 'floor' && hoveredUnit !== null) {
        selectUnit(hoveredUnit);
      } else if (mode === 'floor' && hoveredUnit === null && hoveredFloorIdx === null) {
        returnToOrbital();
      } else if (mode === 'unit' && hoveredUnit === null) {
        returnToFloor();
      }
    });
    canvas.style.cursor = 'grab';

    // Back button
    document.getElementById('back-btn').addEventListener('click', () => {
      if (mode === 'unit')  returnToFloor();
      else                  returnToOrbital();
    });

    // ── RENDER LOOP ───────────────────────────────────────────────────────────
    (function render() {
      requestAnimationFrame(render);
      controls.update();
      composer.render();
    })();

    // ── RESIZE ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = W() / H();
      camera.updateProjectionMatrix();
      renderer.setSize(W(), H());
      composer.setSize(W(), H());
    });

    // ── LOAD ─────────────────────────────────────────────────────────────────
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingBar     = document.getElementById('loading-bar');

    async function init() {
      // 1. Load disponibilidad (non-blocking — continues even if missing)
      await loadDisponibilidad();

      // 2. Load floor labels JSON
      const floorData = await fetch('content/data/nashira_floors.json').then(r => r.json());
      const labelMap  = new Map();
      floorData.floors.forEach(fd => labelMap.set(fd.nodeName, fd.label));

      // 3. Load GLB
      const gltf = await new Promise((resolve, reject) => {
        new GLTFLoader().load(
          'content/models/Nashira_Modelo_Web.glb?v=6',
          resolve,
          xhr => {
            if (xhr.lengthComputable)
              loadingBar.style.width = ((xhr.loaded / xhr.total) * 90) + '%';
          },
          reject
        );
      });

      const model = gltf.scene;
      glbModel = model;
      scene.add(model);
      model.updateMatrixWorld(true);

      // 4. Find floor group nodes (Floor-01 … Floor-10, Floor-Azotea)
      const floorNodeMap = new Map();
      model.traverse(obj => {
        if (!obj.isMesh && obj.name && /^Floor-/.test(obj.name))
          floorNodeMap.set(obj.name, obj);
      });

      const sortedNames = [...floorNodeMap.keys()].sort((a, b) => {
        const na = a.replace('Floor-', '');
        const nb = b.replace('Floor-', '');
        const ia = /^\d+$/.test(na) ? parseInt(na) : 999;
        const ib = /^\d+$/.test(nb) ? parseInt(nb) : 999;
        return ia - ib;
      });

      // 5. Build floor groups + materials + edge lines
      floorGroups = sortedNames.map(nodeName => {
        const floorObj = floorNodeMap.get(nodeName);
        const items    = [];
        floorObj.traverse(obj => {
          if (!obj.isMesh) return;
          obj.material = MAT_BASE;
          const edges = new THREE.EdgesGeometry(obj.geometry, 15);
          obj.add(new THREE.LineSegments(edges, MAT_EDGE));
          items.push(obj);
        });
        const label = labelMap.get(nodeName) || nodeName.replace('Floor-', 'N');
        if (label === 'Azotea') { azoteaItems = items; return null; }
        return { label, nodeName, items, y_center: 0 };
      }).filter(Boolean);

      // 6. Discover units (Unit-NN-ID) and associate to floors by name
      const unitsByFloor = new Map();
      model.traverse(obj => {
        if (obj.isMesh || !obj.name) return;
        const name = obj.name.trim();
        if (!/^Unit-/.test(name)) return;
        const parts    = name.split('-');
        const floorNum = parts[1];
        const unitNum  = parts[2] || '01';
        const floorLbl = 'N' + floorNum.padStart(2, '0');
        const unitLbl  = `Unidad ${parseInt(unitNum, 10)}`;
        const items = [];
        obj.traverse(child => {
          if (!child.isMesh) return;
          child.material = MAT_BASE;
          child.add(new THREE.LineSegments(new THREE.EdgesGeometry(child.geometry, 15), MAT_EDGE));
          items.push(child);
        });
        if (!unitsByFloor.has(floorLbl)) unitsByFloor.set(floorLbl, []);
        unitsByFloor.get(floorLbl).push({ id: name, label: unitLbl, items });
      });

      meshToFloor = new Map();
      floorGroups.forEach((fg, fi) => {
        fg.units = (unitsByFloor.get(fg.label) || []).sort((a, b) => a.id.localeCompare(b.id));
        fg.meshToUnit = new Map();
        fg.units.forEach(u => u.items.forEach(m => {
          fg.meshToUnit.set(m, u);
          meshToFloor.set(m, fi);   // lookup global: mesh → índice de piso
        }));
      });

      // 7. Camera auto-fit
      const box = new THREE.Box3().setFromObject(model);
      modelCenter = box.getCenter(new THREE.Vector3());
      const size  = box.getSize(new THREE.Vector3());
      modelMaxDim = Math.max(size.x, size.y, size.z);
      const fov  = camera.fov * (Math.PI / 180);
      const dist = (modelMaxDim / 2) / Math.tan(fov / 2) * 1.5;
      controls.target.copy(modelCenter);
      camera.position.set(
        modelCenter.x + dist * 0.55,
        modelCenter.y + dist * 0.38,
        modelCenter.z + dist * 0.55
      );
      camera.near = modelMaxDim * 0.001;
      camera.far  = modelMaxDim * 20;
      camera.updateProjectionMatrix();
      controls.minDistance = modelMaxDim * 0.05;
      controls.maxDistance = modelMaxDim * 5;
      controls.update();

      // 8. Calibrate SSAO to model scale
      ssaoPass.kernelRadius = Math.max(4, modelMaxDim * 0.015);
      ssaoPass.minDistance  = modelMaxDim * 0.00004;
      ssaoPass.maxDistance  = modelMaxDim * 0.006;

      // 9. Ghost volumes
      buildGhostVolumes();

      // 10. Floor list UI
      buildFloorList();
      loadingBar.style.width = '100%';

      setTimeout(() => {
        loadingOverlay.classList.add('hidden');
        container.classList.add('visible');
        if (!reducedMotion) {
          controls.autoRotate      = true;
          controls.autoRotateSpeed = 0.4;
          setTimeout(() => { controls.autoRotate = false; }, 4500);
        }
      }, 300);
    }

    init().catch(err => {
      const lbl = document.querySelector('#loading-overlay .loading-label');
      if (lbl) lbl.textContent = 'Error al cargar: ' + err.message;
      console.error(err);
    });
  </script>

  <!-- ── NAV TOGGLE (identical IIFE from blueprint) ────────────────────── -->
  <script>
    (function () {
      const mq          = window.matchMedia('(max-width: 767px)');
      const navBrand    = document.querySelector('.nav-brand');
      const navDropdown = document.getElementById('nav-mobile-dropdown');
      const navWrapper  = document.getElementById('nav-wrapper');

      function closeDropdown() {
        navDropdown.classList.remove('open');
        navBrand.setAttribute('aria-expanded', 'false');
      }

      navBrand.addEventListener('click', (e) => {
        if (!mq.matches) return;
        e.preventDefault();
        if (navDropdown.classList.contains('open')) {
          closeDropdown();
        } else {
          navDropdown.classList.add('open');
          navBrand.setAttribute('aria-expanded', 'true');
        }
      });

      document.addEventListener('pointerdown', (e) => {
        if (!navDropdown.classList.contains('open')) return;
        if (!navWrapper.contains(e.target)) closeDropdown();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDropdown();
      });
    })();
  </script>

</body>
</html>
